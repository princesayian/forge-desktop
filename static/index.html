window.storage={
  get:async k=>{const r=await fetch(`/api/store/${encodeURIComponent(k)}`);if(!r.ok)throw new Error("Key not found");return r.json();},
  set:async(k,v)=>{const s=typeof v==="string"?v:JSON.stringify(v);const r=await fetch(`/api/store/${encodeURIComponent(k)}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({value:s})});return r.json();},
  delete:async k=>{const r=await fetch(`/api/store/${encodeURIComponent(k)}`,{method:"DELETE"});return r.json();},
  list:async p=>{const r=await fetch(`/api/store${p?`?prefix=${encodeURIComponent(p)}`:""}`);const d=await r.json();return d;}
};

// ── Race tree ─────────────────────────────────────────────────────────────────
const RACE_TREE={
  human:{label:"Human",hint:"Standard biological human. No innate powers — ability comes from training, gear, or external modification.",subs:[
    {id:"human",label:"Human",lore:"No biological enhancements — power comes entirely from discipline, skill, and will."},
    {id:"enhanced_human",label:"Enhanced Human",lore:"Biologically modified — serum, experiment, or gene therapy unlocked their abilities. Their humanity is intact but upgraded."},
    {id:"cybernetic_human",label:"Cybernetic Human",lore:"Technology fused into the body — part machine, part human, navigating identity between both worlds."},
  ]},
  mutate:{label:"Mutate",hint:"Human with a genetic mutation as the power source. The mutation may be inherited, triggered, or forced — but it defines who they are.",subs:[
    {id:"a_gene_mutate",label:"A-Gene Mutate",lore:"Born with a dormant aggression gene that activated — power is in the blood, not earned. They never asked for this.",
     codex:{overview:"The A-gene (Aggressive Gene) is a dormant sequence found in approximately 1 in 1.8 million humans. In its dormant state it reads as noncoding DNA. When activated, it does not create new biology — it removes the biological limiters that prevent the human body from exceeding its own structural limits.",biology:"The standard human body runs well below its theoretical performance ceiling. Muscular output is capped to prevent structural damage. Neural processing speed is throttled to prevent heat damage. Adrenaline response is metered to prevent cardiac events. The A-gene turns those protections off. An activated carrier has access to full biological output with no automatic cutoff — physical capability that outpaces any trained human. The body was not designed to run in this state indefinitely, so the A-gene compensates with an accelerated healing factor that emerges alongside activation. Powers are specific to each individual's baseline physiology and psychology; no two carriers are identical, but all trend toward aggression-expressing outputs: raw force, kinetic projection, speed, durability.",activation:"Every confirmed activation event was triggered by extreme stress — physiological, psychological, or both. The activation is not conscious. Carriers consistently describe blacking out or entering a dissociative state, then returning to awareness having done something they couldn't explain and couldn't immediately replicate. Initial activation is violent, disorienting, and dangerous. The first weeks are described as learning to drive something already going 90 mph.",discovery:"The A-gene was first isolated in 2019 by a research team funded through the Nexus Foundation — a private science organization later linked to the same government program that produced Wakháŋ. The original paper was published, then quietly retracted. The researchers scattered. Multiple A-gene carriers have since reported contact from unknown parties shortly before their activation events — suggesting at minimum that someone has a list, and at most, that some activations were not spontaneous.",note:"A-gene carriers didn't choose this. That fact shapes nearly every carrier's psychological relationship to their power. It was not earned, not trained, not discovered willingly. It simply arrived. What they do with it is their only real choice."}},
    {id:"experiment_mutate",label:"Experiment Mutate",lore:"Deliberately altered by outside forces — a test subject who survived and turned the results into identity."},
    {id:"accident_mutate",label:"Accident Mutate",lore:"An unplanned event rewrote their biology — disaster became origin, mutation became purpose."},
  ]},
  alien:{label:"Alien",hint:"Not of this world. Power comes from biology, not modification. Three distinct species — each with a different relationship to strength, civilization, and purpose.",subs:[
    {id:"zyrenian",label:"Zyrenian",lore:"Battle-bred warrior race — power scales with combat experience, pride is genetic, and losing is not in their vocabulary. War is culture.",
     codex:{homeworld:"Zyrak (destroyed) — high-gravity volcanic world once ruled by 12 warring clans for ten millennia. Two centuries ago the clans escalated past the point of survival and burned the planet uninhabitable. Survivors scattered across the galaxy.",biology:"The Bloodline Response: every time a Zyrenian survives a genuine near-death combat event, their cells encode it — power ceiling increases permanently. A Zyrenian who has never truly been tested is weaker than their age suggests. One who has survived a hundred genuine battles is something else entirely. Atrophy is real: combat is biological fuel. Without conflict stimulus, enhanced capabilities slowly degrade.",culture:"Zyrenians have no word for surrender — only 'strategic withdrawal to return stronger,' which is considered intelligent. What they cannot tolerate is quitting. Deep clan loyalty earned through proven capability; once you've earned it, it is absolute and lifelong. They cannot follow someone they don't respect. But if you earn that respect in battle — or through courage they can read as battle — they will die for you without question.",powers:"Scaling strength ceiling, accelerated regeneration, extreme structural durability, combat-instinct neural processing that reads fights in real time.",note:"Displaced Zyrenians in the NK universe are mercenaries, exiles, or soldiers still searching for something worth fighting for. The rare ones who find a cause and redirect their full biology toward it are among the most dangerous beings on the planet."}},
    {id:"auranthi",label:"Auranthi",lore:"Solar-absorbing species from a dead world — immense power drawn from starlight, haunted by a lost civilization they carry alone.",
     codex:{homeworld:"Aureth Prime (destroyed) — twin-sun world whose civilization lasted 40,000 years. The Auranthi did not go to war. They built: libraries, architectures, sciences, medicines. Their civilization was two centuries ahead of any known parallel at the time of the end. The twin suns underwent spectral shift — a natural astronomical event that changed radiation frequency beyond what Auranthi biology could process. There was no enemy. Just physics.",biology:"Auranthi bodies are biological solar cells: they absorb stellar radiation and convert it into metabolic and physical energy. Under a yellow or blue-white star they enter solar saturation — enhanced strength, speed, flight, cellular regeneration, and energy projection. Without solar exposure, these capabilities decay. They do not rely on food as primary fuel. The civilizational archive of Aureth Prime is encoded in Auranthi DNA — not as accessible memory but as intuition. A carrier with no formal education may inexplicably understand advanced physics. The archive speaks through them.",culture:"The survivors carry their grief quietly. They understand on a cellular level that civilization is temporary — which makes them precise about what they do with their time. Many develop deep attachments to the worlds they settle on, not as replacement but as genuine love for what new civilizations can become. They protect what they care about with everything they have.",powers:"Solar saturation under yellow/blue star — flight, enhanced strength and speed, cellular regeneration, solar energy projection. Capabilities scale with star proximity and exposure time.",note:"Auranthi restraint is not weakness. It is philosophy. They have seen what power without purpose looks like. It looks like the spectral shift."}},
    {id:"dravosi",label:"Dravosi",lore:"Apex-predator empire builders — genetically perfected through 40,000 years of deliberate self-selection, driven by dominance, legacy, and the belief that strength is the only honest currency.",
     codex:{homeworld:"Dravoss — capital world of the Dravosi Supremacy, a 40-star-system empire that has expanded continuously for eight millennia. Built not on ideology but on one principle: the capable govern the rest.",biology:"Dravosi physiology represents the deliberate peak of biological development — 40,000 years of selective breeding amplified every natural advantage and eliminated every weakness. High-gravity origin gave them dense cellular structure and efficient musculature. Selective pressure removed disease susceptibility, pain tolerance limitations, and regenerative caps. They live 400-600 years aging past 30 almost imperceptibly, maintaining full physical capability until their final decades. They can survive brief vacuum exposure and process damage that would kill most species.",culture:"The Supremacy runs on one axiom: the capable govern the rest. What has no place in Dravosi society is voluntary weakness — failure to improve is a social transgression. What complicates the reading is that many Dravosi genuinely believe they are doing the galaxy a service. Subjugated worlds under the Supremacy are stable. Infrastructure is maintained. They are not wrong that their occupation produces order. They are not capable of understanding why that is insufficient. A Dravosi who encounters genuine resistance escalates immediately — not out of anger but out of curiosity. They want to know where the ceiling is.",powers:"Peak biological performance: strength, speed, and durability at the functional limit of biological life. Extended lifespan, vacuum resistance, rapid cellular repair. No exotic powers — just biology pushed to its absolute ceiling.",note:"Dravosi in the NK universe are scouts, exiles, or defectors. Exiles — cast out for failing the Supremacy's standards — have all the capability and none of the backing. They may be trying to prove something. Or they may have decided the Supremacy was wrong. Both make them unpredictable."}},
  ]},

};
function raceLabel(r){
  if(!r)return"";
  if(typeof r==="string")return r;
  if(r.main==="hybrid"){
    const l1=r.sub1?((RACE_TREE[r.sub1.main]?.subs||[]).find(s=>s.id===r.sub1.sub)?.label||r.sub1.sub||""):"";
    const l2=r.sub2?((RACE_TREE[r.sub2.main]?.subs||[]).find(s=>s.id===r.sub2.sub)?.label||r.sub2.sub||""):"";
    return l1&&l2?`Hybrid (${l1} · ${l2})`:"Hybrid";
  }
  return(RACE_TREE[r.main]?.subs||[]).find(s=>s.id===r.sub)?.label||r.sub||r.main||"";
}
function raceLore(r){
  if(!r||typeof r==="string")return"";
  if(r.main==="hybrid"){
    const l1=r.sub1?((RACE_TREE[r.sub1.main]?.subs||[]).find(s=>s.id===r.sub1.sub)?.lore||""):"";
    const l2=r.sub2?((RACE_TREE[r.sub2.main]?.subs||[]).find(s=>s.id===r.sub2.sub)?.lore||""):"";
    return[l1,l2].filter(Boolean).join(" Their hybrid heritage blends both bloodlines.");
  }
  return(RACE_TREE[r.main]?.subs||[]).find(s=>s.id===r.sub)?.lore||"";
}

function randHeroName(race){
  const sub=race?.sub||race;
  const main=race?.main;
  const r=Math.random();
  if(sub==="zyrenian"||main==="zyrenian"){
    const n=_NAMES.zyrenian;
    if(r<0.45)return _rp(n.single);
    if(r<0.75)return _rp(n.prefix)+_rp(n.suffix);
    return _rp(n.single);
  }
  if(sub==="auranthi"||main==="auranthi"){
    const n=_NAMES.auranthi;
    if(r<0.5)return _rp(n.single);
    if(r<0.78)return _rp(n.prefix)+_rp(n.suffix);
    return _rp(n.single);
  }
  if(sub==="dravosi"||main==="dravosi"){
    const n=_NAMES.dravosi;
    if(r<0.45)return _rp(n.single);
    if(r<0.75)return _rp(n.prefix)+" "+_rp(n.suffix);
    return _rp(n.single);
  }
  if(sub==="a_gene_mutate"||sub==="a_gene"){
    return _rp(_NAMES.a_gene.single);
  }
  const h=_NAMES.human;
  if(r<0.55)return _rp(h.prefix)+_rp(h.suffix);
  if(r<0.78)return _rp(h.prefix);
  return _rp(h.suffix);
}

const autoScore=m=>{const v=Object.values(m.stats||{});return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):0;};
const autoTierFn=m=>{const sc=autoScore(m);return sc>=85?"S":sc>=70?"A":sc>=55?"B":"C";};
const pronounOf=g=>g==="Female"?"she":g==="Non-binary"?"they":"he";
const ageStage=age=>{const n=parseInt(age);if(isNaN(n))return "";if(n<13)return "child";if(n<18)return "teen";if(n<=25)return "young adult";return "adult";};

function RaceSelector({value,onChange,color}){
  const c=color||G;
  const init=value&&typeof value==="object"?value:{};
  const[main,setMain]=useState(init.main||null);
  const[sub,setSub]=useState(init.sub||null);
  const[h,setH]=useState([init.sub1||{main:null,sub:null},init.sub2||{main:null,sub:null}]);
  const mounted=useRef(false);
  useEffect(()=>{
    if(!mounted.current){mounted.current=true;return;}
    if(main==="hybrid"){
      if(h[0].main&&h[0].sub&&h[1].main&&h[1].sub) onChange({main:"hybrid",sub1:h[0],sub2:h[1]});
    } else if(main&&sub){
      onChange({main,sub});
    }
  },[main,sub,JSON.stringify(h)]);
  const bs=(active)=>({padding:"4px 10px",background:active?`${c}22`:"var(--bg3)",border:`1px solid ${active?c:"var(--border2)"}`,borderRadius:20,cursor:"pointer",color:active?c:"var(--text2)",fontSize:9,fontFamily:"monospace"});
  const label=raceLabel(main==="hybrid"?{main:"hybrid",sub1:h[0],sub2:h[1]}:main&&sub?{main,sub}:null);
  return(
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
        {Object.entries(RACE_TREE).map(([id,r])=>(
          <button key={id} title={r.hint||""} style={bs(main===id)} onClick={()=>{setMain(id);setSub(null);setH([{main:null,sub:null},{main:null,sub:null}]);}}>{r.label}</button>
        ))}
      </div>
      {main&&main!=="hybrid"&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:5,paddingLeft:8,borderLeft:`2px solid ${c}30`,marginBottom:4}}>
          {RACE_TREE[main].subs.map(s=>(
            <button key={s.id} title={s.lore||""} style={bs(sub===s.id)} onClick={()=>setSub(s.id)}>{s.label}</button>
          ))}
        </div>
      )}
      {main==="hybrid"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8,paddingLeft:8,borderLeft:`2px solid ${c}30`}}>
          {[0,1].map(i=>{
            const hv=h[i];
            return(
              <div key={i}>
                <div style={{fontSize:7.5,color:"var(--text4)",letterSpacing:"0.1em",marginBottom:4}}>{i===0?"FIRST RACE":"SECOND RACE"}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>
                  {Object.entries(RACE_TREE).filter(([id])=>id!=="hybrid").map(([id,r])=>(
                    <button key={id} title={r.hint||""} style={bs(hv.main===id)} onClick={()=>setH(prev=>prev.map((x,j)=>j===i?{main:id,sub:null}:x))}>{r.label}</button>
                  ))}
                </div>
                {hv.main&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,paddingLeft:6,borderLeft:`1px solid ${c}20`}}>
                    {RACE_TREE[hv.main].subs.map(s=>(
                      <button key={s.id} title={s.lore||""} style={bs(hv.sub===s.id)} onClick={()=>setH(prev=>prev.map((x,j)=>j===i?{...x,sub:s.id}:x))}>{s.label}</button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {label&&<div style={{fontSize:8.5,color:`${c}88`,marginTop:5,fontFamily:"monospace"}}>→ {label}</div>}
      {main&&main!=="hybrid"&&sub&&(()=>{
        const entry=(RACE_TREE[main]?.subs||[]).find(s=>s.id===sub);
        const cx=entry?.codex;
        if(!cx)return null;
        const rows=Object.entries(cx).map(([k,v])=>[k.replace(/([A-Z])/g," $1").trim(),v]).filter(([,v])=>v);
        return(
          <div style={{marginTop:10,padding:"10px 13px",background:`${c}08`,border:`1px solid ${c}22`,borderRadius:8}}>
            <div style={{fontSize:7.5,letterSpacing:"0.18em",textTransform:"uppercase",color:`${c}88`,fontFamily:"monospace",marginBottom:8}}>Codex — {entry.label}</div>
            {rows.map(([label,text])=>(
              <div key={label} style={{marginBottom:8}}>
                <span style={{fontSize:8,letterSpacing:"0.12em",textTransform:"uppercase",color:`${c}77`,fontFamily:"monospace"}}>{label}: </span>
                <span style={{fontSize:10.5,color:"var(--text3)",lineHeight:1.6}}>{text}</span>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

  const[storyDir,setStoryDir]=useState("");
  const[regenLoading,setRegenLoading]=useState(false);
  const c=member.color;
  async function regenOrigin(){
    if(!callAI)return;
    setRegenLoading(true);
    try{
      const rl=raceLabel(race);
      const rc=raceLore(race);
      const p=await callAI(`Regenerate the origin story for this character. JSON only, key "origin".\n\nCharacter: ${member.heroName} (${member.realName})\nRole: ${member.role||"Hero"}\nTeam: ${teamName||"Unknown"}\nRace: ${rl||"Unspecified"}\nRace lore: ${rc||"No special racial traits"}\nPowers: ${(member.powers||[]).map(pw=>pw.name).join(", ")}\nCurrent origin: ${o}\n${storyDir.trim()?`Story direction (shape the new origin around this): ${storyDir.trim()}\n`:""}\nWrite a new origin (2-3 sentences) rooted in their racial biology and history${storyDir.trim()?" and the story direction given":""}.${!storyDir.trim()?" Keep their core identity but reshape the backstory through their race.":""}\n{"origin":"new origin here"}`);
      if(p?.origin) setO(p.origin);
    }catch(e){}
    setRegenLoading(false);
  }
  return(<div style={{padding:"18px 20px",background:"var(--bg-card2, #07070E)",border:`1px solid ${c}33`,borderRadius:"0 0 12px 12px"}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
      <div>
        <div style={{fontSize:9,letterSpacing:"0.12em",color:`${c}88`,textTransform:"uppercase",marginBottom:5}}>Gender</div>
        <select value={gender} onChange={e=>setGender(e.target.value)} style={{width:"100%",padding:"7px 10px",background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text-primary)",fontSize:11}}>
          <option value="">— unset —</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Non-binary">Non-binary</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div>
        <div style={{fontSize:9,letterSpacing:"0.12em",color:`${c}88`,textTransform:"uppercase",marginBottom:5}}>Birth Year</div>
        <input type="number" placeholder="e.g. 1995" value={birthYear} onChange={e=>{setBirthYear(e.target.value);setAge(e.target.value?String(2026-parseInt(e.target.value)):"");}} style={{padding:"7px 10px"}}/>
      </div>
      <div>
        <div style={{fontSize:9,letterSpacing:"0.12em",color:`${c}88`,textTransform:"uppercase",marginBottom:5}}>Age {birthYear&&age?`(${age} yrs)`:""}</div>
        <input type="text" placeholder="e.g. 28 or Unknown" value={age} onChange={e=>setAge(e.target.value)} style={{padding:"7px 10px"}}/>
      </div>
    </div>
    <div style={{marginBottom:14}}>
      <div style={{fontSize:9,letterSpacing:"0.12em",color:`${c}88`,textTransform:"uppercase",marginBottom:8}}>Race</div>
      <RaceSelector value={race} onChange={setRace} color={c}/>
    </div>
    <div style={{fontSize:9,letterSpacing:"0.18em",color:`${c}88`,textTransform:"uppercase",marginBottom:6}}>Tagline</div>
    <input type="text" value={t} onChange={e=>setT(e.target.value)} style={{marginBottom:14}}/>
    {callAI&&<div style={{marginBottom:10}}>
      <div style={{fontSize:9,letterSpacing:"0.12em",color:`${c}88`,textTransform:"uppercase",marginBottom:5}}>Story Direction <span style={{opacity:0.55}}>(optional)</span></div>
      <input type="text" placeholder="e.g. Betrayed by their mentor · Found faith after losing everything" value={storyDir} onChange={e=>setStoryDir(e.target.value)} style={{padding:"6px 10px",fontSize:10.5}}/>
    </div>}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
      <div style={{fontSize:9,letterSpacing:"0.18em",color:`${c}88`,textTransform:"uppercase"}}>Origin</div>
      {callAI&&<button onClick={regenOrigin} disabled={regenLoading} style={{fontSize:8.5,padding:"2px 10px",background:`${c}14`,border:`1px solid ${c}55`,borderRadius:12,cursor:"pointer",color:c,fontFamily:"monospace",opacity:regenLoading?0.6:1}}>
        {regenLoading?"Generating...":"↺ Regenerate from Race"}
      </button>}
    </div>
    <textarea value={o} onChange={e=>setO(e.target.value)} style={{height:80,marginBottom:14}}/>
    <div style={{fontSize:9,letterSpacing:"0.18em",color:`${c}88`,textTransform:"uppercase",marginBottom:8}}>Team Rank</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
      {TEAM_RANKS.map(r=><button key={r.id} onClick={()=>setTeamRank(r.id)} style={{fontSize:9,padding:"3px 10px",background:teamRank===r.id?`${r.color||G}22`:"var(--bg3)",border:`1px solid ${teamRank===r.id?(r.color||G):"var(--border2)"}`,borderRadius:20,cursor:"pointer",color:teamRank===r.id?(r.color||G):"var(--text2)",fontFamily:"monospace"}}>{r.icon?`${r.icon} `:""}{r.label}</button>)}
    </div>
    <div style={{fontSize:9,letterSpacing:"0.18em",color:`${c}88`,textTransform:"uppercase",marginBottom:8}}>Team Alignment</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
      {[{id:"base",label:"Member"},...NK_ALIGNMENTS].map(a=><button key={a.id} onClick={()=>setAlign(a.id)} style={{fontSize:9,padding:"3px 10px",background:align===a.id?`${(ALIGN_META[a.id]||{color:G}).color}22`:"var(--bg3)",border:`1px solid ${align===a.id?(ALIGN_META[a.id]||{color:G}).color:"var(--border2)"}`,borderRadius:20,cursor:"pointer",color:align===a.id?(ALIGN_META[a.id]||{color:G}).color:"var(--text2)",fontFamily:"monospace"}}>{a.label}</button>)}
    </div>
    <div style={{fontSize:9,letterSpacing:"0.18em",color:`${c}88`,textTransform:"uppercase",marginBottom:8}}>Stats</div>
    <div className="fstats-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>{Object.entries(stats).map(([k,v])=>(<div key={k}><div style={{fontSize:9,color:"var(--text2)",marginBottom:4,textTransform:"uppercase"}}>{k}</div><input type="number" min="1" max="100" value={v} onChange={e=>setStats(p=>({...p,[k]:Math.min(100,Math.max(1,+e.target.value))}))} style={{padding:"6px 10px"}}/></div>))}</div>
    <div style={{fontSize:9,letterSpacing:"0.18em",color:`${c}88`,textTransform:"uppercase",marginBottom:8}}>Powers</div>
    {powers.map((p,i)=>(<div key={i} style={{marginBottom:10}}><input type="text" placeholder="Power name" value={p.name} onChange={e=>setPowers(pw=>pw.map((x,j)=>j===i?{...x,name:e.target.value}:x))} style={{marginBottom:4}}/><input type="text" placeholder="Description" value={p.desc} onChange={e=>setPowers(pw=>pw.map((x,j)=>j===i?{...x,desc:e.target.value}:x))}/></div>))}
    <div style={{display:"flex",gap:10,marginTop:16}}>
      <button onClick={onCancel} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text2)",fontSize:11}}>Cancel</button>
      <button onClick={()=>onSave({tagline:t,origin:o,stats,powers,nkAlignment:align,teamRank,gender,age,birthYear,race,species:raceLabel(race)||member.species||""})} style={{flex:2,padding:"10px",background:`${c}18`,border:`1px solid ${c}`,borderRadius:8,cursor:"pointer",color:c,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase"}}>Save Changes</button>
    </div>
  </div>);
}

function TeamLogo({team,size=40,style:extra={}}){
  const c=team.color||G;
  const seed=team.logoSeed!=null?team.logoSeed:Math.abs((team.id||'').split('').reduce((a,ch)=>((a<<5)-a)+ch.charCodeAt(0)|0,0));
  const t=seed%8;
  const sw=size<30?0.9:1.3;
  const d=Math.round(size*0.72);
  const shapes=[
    <g key="s"><polygon points="16,3 26,8 26,18 16,28 6,18 6,8" fill={`${c}30`} stroke={c} strokeWidth={sw}/><polygon points="16,9 21,12 21,18 16,23 11,18 11,12" fill={c} opacity="0.5"/></g>,
    <g key="s"><polygon points="16,3 26.5,9 26.5,23 16,29 5.5,23 5.5,9" fill="none" stroke={c} strokeWidth={sw}/><polygon points="16,8 21.5,11.25 21.5,20.75 16,24 10.5,20.75 10.5,11.25" fill={c} opacity="0.4"/></g>,
    <g key="s"><polygon points="20,2 8,18 15,18 12,30 24,14 17,14" fill={c} opacity="0.9"/></g>,
    <g key="s"><rect x="9" y="9" width="14" height="14" transform="rotate(45,16,16)" fill={`${c}25`} stroke={c} strokeWidth={sw}/><line x1="16" y1="2" x2="16" y2="11" stroke={c} strokeWidth={sw*0.8} opacity="0.5"/><line x1="16" y1="21" x2="16" y2="30" stroke={c} strokeWidth={sw*0.8} opacity="0.5"/><line x1="2" y1="16" x2="11" y2="16" stroke={c} strokeWidth={sw*0.8} opacity="0.5"/><line x1="21" y1="16" x2="30" y2="16" stroke={c} strokeWidth={sw*0.8} opacity="0.5"/><circle cx="16" cy="16" r="3.5" fill={c}/></g>,
    <g key="s"><path d="M16 2 L18.5 13.5 L30 16 L18.5 18.5 L16 30 L13.5 18.5 L2 16 L13.5 13.5 Z" fill={c} opacity="0.85"/></g>,
    <g key="s"><polyline points="5,22 16,8 27,22" fill="none" stroke={c} strokeWidth={sw*1.7} strokeLinejoin="round" strokeLinecap="round"/><polyline points="7,27 16,14 25,27" fill="none" stroke={c} strokeWidth={sw*1.3} strokeLinejoin="round" strokeLinecap="round" opacity="0.42"/></g>,
    <g key="s"><circle cx="16" cy="16" r="3.5" fill={c}/><ellipse cx="16" cy="16" rx="13" ry="5.5" fill="none" stroke={c} strokeWidth={sw*0.9} opacity="0.65"/><ellipse cx="16" cy="16" rx="13" ry="5.5" fill="none" stroke={c} strokeWidth={sw*0.9} opacity="0.65" transform="rotate(60,16,16)"/><ellipse cx="16" cy="16" rx="13" ry="5.5" fill="none" stroke={c} strokeWidth={sw*0.9} opacity="0.65" transform="rotate(120,16,16)"/></g>,
    <g key="s"><polygon points="16,4 29,27 3,27" fill="none" stroke={c} strokeWidth={sw}/><polygon points="16,11 23.5,25 8.5,25" fill={c} opacity="0.42"/></g>,
  ];
  return(
    <div style={{width:size,height:size,borderRadius:Math.round(size*0.22),background:`${c}12`,border:`1px solid ${c}33`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden",boxShadow:`0 0 10px ${c}18`,...extra}}>
      <svg width={d} height={d} viewBox="0 0 32 32">{shapes[t]}</svg>
    </div>
  );
}

function TeamCard({team,isActive,memberCount,onSelect,onEdit,onDelete}){
  const am=ALIGN_META[team.nkAlignment]||ALIGN_META.neutral;
  const type=TEAM_TYPES.find(t=>t.id===team.type);
  return(<div onClick={onSelect} style={{background:isActive?`${team.color}12`:"var(--bg3)",border:`2px solid ${isActive?team.color+"88":"var(--border2)"}`,borderRadius:12,padding:"16px 18px",cursor:"pointer",transition:"all 0.15s",position:"relative"}}>
    {isActive&&<div style={{position:"absolute",top:10,right:10,width:8,height:8,borderRadius:"50%",background:team.color}}/>}
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
      <TeamLogo team={team} size={40}/>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:"bold",color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.name}</div><div style={{fontSize:9,color:"var(--text3)",marginTop:1}}>{memberCount} member{memberCount!==1?"s":""} · {type?.label||team.type}</div></div>
    </div>
    <div style={{fontSize:11,color:"var(--text2)",lineHeight:1.5,marginBottom:10,minHeight:32}}>{(team.description||"").slice(0,80)}{(team.description||"").length>80?"...":""}</div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      {team.isDefault?<span style={{fontSize:9,padding:"2px 9px",background:`${team.color}18`,border:`1px solid ${team.color}44`,borderRadius:20,color:team.color}}>Base Team</span>:<AlignmentBadge alignment={team.nkAlignment}/>}
      <div style={{display:"flex",gap:6}}>
        <button onClick={e=>{e.stopPropagation();onEdit();}} style={{fontSize:9,padding:"2px 8px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,cursor:"pointer",color:"var(--text2)",fontFamily:"monospace"}}>Edit</button>
        {!team.isDefault&&<button onClick={e=>{e.stopPropagation();onDelete();}} style={{fontSize:9,padding:"2px 8px",background:"rgba(163,45,45,0.1)",border:"1px solid rgba(163,45,45,0.28)",borderRadius:6,cursor:"pointer",color:"#e74c3c",fontFamily:"monospace"}}>Delete</button>}
      </div>
    </div>
  </div>);

function TeamCreator({teams,members=[],onSave,onCancel,callAI,ollamaOk,initialData}){
  const[step,setStep]=useState(1);
  const[name,setName]=useState(initialData?.name||"");
  const[abbr,setAbbr]=useState(initialData?.abbr||"");
  const[color,setColor]=useState(initialData?.color||"#534AB7");
  const[type,setType]=useState(initialData?.type||"street");
  const[align,setAlign]=useState(initialData?.nkAlignment||"neutral");
  const[desc,setDesc]=useState(initialData?.description||"");
  const[motto,setMotto]=useState(initialData?.motto||"");
  const[origin,setOrigin]=useState(initialData?.origin||"");
  const[genLoading,setGenLoading]=useState(false);
  const[genError,setGenError]=useState("");
  const[genElapsed,setGenElapsed]=useState(0);
  const[logoSeed,setLogoSeed]=useState(initialData?.logoSeed??Math.floor(Math.random()*8));
  const[relatedTeams,setRelatedTeams]=useState([]);
  const[relatedMembers,setRelatedMembers]=useState([]);
  const[loreHint,setLoreHint]=useState("");
  const autoAbbr=n=>n.split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,3)||"??";
  const handleName=n=>{setName(n);if(!abbr||abbr===autoAbbr(name))setAbbr(autoAbbr(n));};
  const generateLore=async()=>{
    setGenLoading(true);setGenError("");setGenElapsed(0);
    const timer=setInterval(()=>setGenElapsed(n=>n+1),1000);
    try{
      const relTeamNames=relatedTeams.map(id=>teams.find(t=>t.id===id)?.name).filter(Boolean);
      const relMemberNames=relatedMembers.map(id=>members.find(m=>m.id===id)?.heroName).filter(Boolean);
      const ctx=[
        relTeamNames.length&&`Connected teams: ${relTeamNames.join(", ")}`,
        relMemberNames.length&&`Key characters involved: ${relMemberNames.join(", ")}`,
        loreHint.trim()&&`Story direction: ${loreHint.trim()}`,
      ].filter(Boolean).join("\n");
      const p=await callAI(`Create lore for a superhero team. JSON only, keys "description", "motto", "origin".\n\nTeam name: ${name}\nType: ${type}\nAlignment: ${align}\n${ctx?ctx+"\n":""}\nWeave any connections and story direction naturally into the origin. Keep the tone dark, grounded, and personal.\n\n{"description":"1 sentence team description","motto":"short team motto","origin":"2-3 sentence origin story"}`);
      if(p?.description)setDesc(p.description);
      if(p?.motto)setMotto(p.motto);
      if(p?.origin)setOrigin(p.origin);
    }catch(e){setGenError(e.message||"Generation failed");}
    clearInterval(timer);
    setGenLoading(false);
  };
  const handleSave=()=>{
    if(!name.trim())return;
    const isEdit=!!initialData;
    onSave({
      id:isEdit?initialData.id:`team-${Date.now()}`,
      isDefault:isEdit?initialData.isDefault:false,
      createdAt:isEdit?initialData.createdAt:Date.now(),
      name:name.trim(),abbr:abbr.trim()||autoAbbr(name),color,colorLight:color+"CC",type,nkAlignment:align,description:desc,motto,origin,logoSeed
    });
  };
  const s2={padding:"12px 16px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10};
  const lbl={fontSize:9,letterSpacing:"0.18em",color:"rgba(212,175,55,0.75)",textTransform:"uppercase",marginBottom:8,display:"block"};
  const chip=(a,c=G)=>({padding:"6px 12px",background:a?`${c}16`:"var(--bg3)",border:`1px solid ${a?c:"var(--border2)"}`,borderRadius:20,cursor:"pointer",fontSize:10.5,color:a?c:"var(--text3)",fontFamily:"monospace",fontWeight:a?"bold":"normal"});
  return(<div style={{background:"var(--bg-card2, #07070E)",border:"1px solid rgba(212,175,55,0.2)",borderRadius:14,overflow:"hidden"}}>
    <div style={{background:"rgba(212,175,55,0.06)",borderBottom:"1px solid rgba(212,175,55,0.15)",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontSize:9,letterSpacing:"0.18em",color:`${G}88`,textTransform:"uppercase",marginBottom:2}}>New Team · Step {step} of 3</div><div style={{fontSize:15,fontWeight:"bold",color:"var(--text-primary)"}}>{step===1?"Identity":step===2?"Alignment & Type":"Lore"}</div></div>
      <button onClick={onCancel} style={{padding:"5px 12px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:7,cursor:"pointer",color:"var(--text2)",fontSize:10,fontFamily:"monospace"}}>Cancel</button>
    </div>
    <div style={{padding:"20px"}}>
      {step===1&&(<>
        <div style={{marginBottom:14}}><span style={lbl}>Team Name</span><div style={{display:"flex",gap:6}}><input type="text" placeholder="e.g. The Iron Covenant" value={name} onChange={e=>handleName(e.target.value)} style={{flex:1}}/><button onClick={()=>handleName(randTeamName())} title="Random name" style={{padding:"0 12px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text2)",fontSize:16,flexShrink:0}}>⚄</button></div></div>
        <div style={{marginBottom:16}}><span style={lbl}>Abbreviation</span><input type="text" placeholder="e.g. TIC" value={abbr} onChange={e=>setAbbr(e.target.value.toUpperCase().slice(0,4))} style={{maxWidth:120}}/></div>
        <span style={lbl}>Team Color</span>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:6}}>
          {TEAM_COLORS.map(tc=><button key={tc.id} onClick={()=>setColor(tc.hex)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:color===tc.hex?`${tc.hex}18`:"var(--bg3)",border:`1px solid ${color===tc.hex?tc.hex:"var(--border2)"}`,borderRadius:20,cursor:"pointer",fontFamily:"monospace",fontSize:10.5,color:color===tc.hex?"var(--text-primary)":"var(--text3)"}}><div style={{width:10,height:10,borderRadius:"50%",background:tc.hex,flexShrink:0}}/>{tc.label}</button>)}
        </div>
        <div style={{marginTop:16,marginBottom:4}}>
          <span style={lbl}>Team Logo</span>
          <div style={{display:"flex",alignItems:"center",gap:14,padding:"12px 14px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:9}}>
            <TeamLogo team={{id:`preview-${logoSeed}`,color,logoSeed}} size={56}/>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:"var(--text2)",marginBottom:8,fontFamily:"monospace"}}>Style {logoSeed+1} of 8 · updates with your color</div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>setLogoSeed(s=>(s+7)%8)} style={{padding:"4px 11px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,cursor:"pointer",color:"var(--text2)",fontSize:10,fontFamily:"monospace"}}>← Prev</button>
                <button onClick={()=>setLogoSeed(s=>(s+1)%8)} style={{padding:"4px 11px",background:`${color}14`,border:`1px solid ${color}55`,borderRadius:6,cursor:"pointer",color,fontSize:10,fontFamily:"monospace"}}>Next →</button>
              </div>
            </div>
          </div>
        </div>
        <button disabled={!name.trim()} onClick={()=>setStep(2)} style={{width:"100%",padding:"12px",background:name.trim()?`${G}14`:"var(--bg3)",border:`1px solid ${name.trim()?G:"var(--border2)"}`,borderRadius:8,cursor:name.trim()?"pointer":"not-allowed",color:name.trim()?G:"var(--text4)",fontSize:10.5,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"monospace",marginTop:14}}>Next →</button>
      </>)}
      {step===2&&(<>
        <span style={lbl}>Team Type</span>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>{TEAM_TYPES.map(tt=><button key={tt.id} style={chip(type===tt.id,color)} onClick={()=>setType(tt.id)}>{tt.label}</button>)}</div>
        <span style={lbl}>Team Alignment</span>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {NK_ALIGNMENTS.map(a=><button key={a.id} onClick={()=>setAlign(a.id)} style={{padding:"10px 14px",background:align===a.id?`${a.color}14`:"var(--bg3)",border:`1px solid ${align===a.id?a.color:"var(--border2)"}`,borderRadius:9,cursor:"pointer",textAlign:"left",fontFamily:"monospace"}}>
            <div style={{fontSize:12,color:"var(--text-primary)",fontWeight:align===a.id?"bold":"normal"}}>{a.label}</div>
            <div style={{fontSize:10,color:"var(--text2)",marginTop:2}}>{a.desc}</div>
          </button>)}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setStep(1)} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>
          <button onClick={()=>setStep(3)} style={{flex:2,padding:"10px",background:`${color}14`,border:`1px solid ${color}`,borderRadius:8,cursor:"pointer",color,fontSize:10.5,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"monospace"}}>Next →</button>
        </div>
      </>)}
      {step===3&&(<>
        {/* AI Context section */}
        <div style={{background:"rgba(212,175,55,0.04)",border:"1px solid rgba(212,175,55,0.12)",borderRadius:10,padding:"14px",marginBottom:16}}>
          <div style={{fontSize:9,letterSpacing:"0.18em",color:`${G}88`,textTransform:"uppercase",marginBottom:12,fontFamily:"monospace"}}>AI Context — optional</div>
          {teams.length>0&&(<>
            <span style={lbl}>Relates to — Teams</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {teams.map(t=>{const sel=relatedTeams.includes(t.id);return(<button key={t.id} onClick={()=>setRelatedTeams(p=>sel?p.filter(x=>x!==t.id):[...p,t.id])} style={{display:"flex",alignItems:"center",gap:6,...chip(sel,t.color)}}><TeamLogo team={t} size={16} style={{borderRadius:3}}/>{t.name}</button>);})}
            </div>
          </>)}
          {members.length>0&&(<>
            <span style={lbl}>Relates to — Characters</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {members.map(m=>{const sel=relatedMembers.includes(m.id);const mc=m.color||color;return(<button key={m.id} onClick={()=>setRelatedMembers(p=>sel?p.filter(x=>x!==m.id):[...p,m.id])} style={{display:"flex",alignItems:"center",gap:5,...chip(sel,mc)}}><div style={{width:6,height:6,borderRadius:"50%",background:mc,flexShrink:0}}/>{m.heroName}</button>);})}</div>
          </>)}

function RemotePanel({remoteInfo,setRemoteInfo,onClose,G,s,forgeVersion}){
  const[rpin,setRpin]=useState(()=>remoteInfo?.pin_set?"••••":"");
  const[rdomain,setRdomain]=useState(remoteInfo?.duck_domain||"");
  const[rtoken,setRtoken]=useState("");
  const[saving,setSaving]=useState(false);
  const[restartNeeded,setRestartNeeded]=useState(false);
  const saveRemote=async(enabled)=>{
    setSaving(true);
    const body={remote_enabled:enabled};
    if(rpin&&rpin!=="••••")body.remote_pin=rpin;
    if(rdomain)body.duck_domain=rdomain;
    if(rtoken)body.duck_token=rtoken;
    const cr=await fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const cd=await cr.json();
    if(cd.needs_restart)setRestartNeeded(true);
    const r=await fetch("/api/remote");setRemoteInfo(await r.json());
    setSaving(false);
  };
  return(<div style={{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"14px 22px"}}>
    <div style={{maxWidth:960,margin:"0 auto"}}>
      <div style={{fontSize:9,letterSpacing:"0.18em",color:"#5EB1FF88",textTransform:"uppercase",marginBottom:12}}>Remote Access & Settings — Nocturnal Inc Superhero Forge {forgeVersion?`v${forgeVersion}`:""}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:12}}>
        <div style={{padding:"12px 14px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8}}>
          <div style={{fontSize:10,fontWeight:"bold",color:"#5EB1FF",marginBottom:8}}>Cloudflared Tunnel</div>
          <div style={{fontSize:10,color:"var(--text2)",lineHeight:1.6,marginBottom:8}}>{remoteInfo?.cloudflared?"✓ cloudflared installed":"✗ Not installed — Mac: brew install cloudflared · Windows: winget install cloudflare.cloudflared"}</div>
          {remoteInfo?.url?<div style={{fontSize:10,color:"#5DCAA5",wordBreak:"break-all"}}>{remoteInfo.url}</div>:<div style={{fontSize:10,color:"var(--text4)"}}>Tunnel starts when Remote Access is enabled</div>}
        </div>
        <div style={{padding:"12px 14px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8}}>
          <div style={{fontSize:10,fontWeight:"bold",color:G,marginBottom:8}}>DuckDNS (persistent domain)</div>
          <input type="text" value={rdomain} onChange={e=>setRdomain(e.target.value)} placeholder="your-domain (no .duckdns.org)" style={{marginBottom:6,fontSize:10}}/>
          <input type="text" value={rtoken} onChange={e=>setRtoken(e.target.value)} placeholder="DuckDNS token" style={{marginBottom:2,fontSize:10}}/>
          <div style={{fontSize:9,color:"var(--text4)"}}>Get a free domain at duckdns.org + forward port 7432 on your router</div>
        </div>
        <div style={{padding:"12px 14px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8}}>
          <div style={{fontSize:10,fontWeight:"bold",color:"#e74c3c",marginBottom:8}}>Access PIN</div>
          <input type="password" value={rpin} onChange={e=>setRpin(e.target.value)} placeholder="Set a PIN for remote access" style={{marginBottom:6,fontSize:10}}/>
          <div style={{fontSize:9,color:"var(--text4)"}}>Remote visitors must enter this PIN. Local access is always unrestricted.</div>
        </div>
      </div>
      {restartNeeded&&<div style={{marginTop:10,padding:"8px 13px",background:"rgba(212,175,55,0.08)",border:"1px solid rgba(212,175,55,0.35)",borderRadius:7,fontSize:10,color:"#D4AF37",letterSpacing:"0.04em"}}>⚠ Restart the app to finish enabling remote access — Flask needs to rebind to all interfaces. DuckDNS is already updating your IP in the background.</div>}
      <div style={{display:"flex",gap:10,marginTop:12}}>
        <button onClick={()=>saveRemote(true)} disabled={saving} style={{...s.bigBtn(saving,"#5EB1FF"),width:"auto",padding:"8px 20px",marginTop:0}}>{saving?"Saving...":"Enable Remote Access"}</button>

      </div>
    </div>
  </div>);
}

  const callAI=useCallback(async(prompt,onToken,maxTokens=1500)=>{
    const controller=new AbortController();
    genControllerRef.current=controller;
    // Retry config: exponential backoff with jitter
    const MAX_RETRIES=3;
    const RETRYABLE_STATUS=new Set([429,500,502,503,504]);
    let lastErr;
    for(let attempt=0;attempt<=MAX_RETRIES;attempt++){
      if(attempt>0){
        // base delay: 1s, 2s, 4s — plus up to 500ms random jitter
        const delay=1000*Math.pow(2,attempt-1)+Math.random()*500;
        await new Promise(r=>setTimeout(r,delay));
        if(controller.signal.aborted){genControllerRef.current=null;throw new Error("Generation cancelled.");}
        if(onToken)onToken(""); // clear partial stream on retry
      }

        const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:currentModel,max_tokens:maxTokens,messages:[{role:"user",content:prompt}]}),signal:controller.signal});
        if(!res.ok){
          if(RETRYABLE_STATUS.has(res.status)&&attempt<MAX_RETRIES){lastErr=new Error(`Server error ${res.status}`);continue;}
          throw new Error(`HTTP ${res.status}`);
        }
        if(!res.body)throw new Error("No response stream");
        const reader=res.body.getReader();
        const dec=new TextDecoder();
        let buf="",full="";
        while(true){
          const{done,value}=await reader.read();
          if(done)break;
          buf+=dec.decode(value,{stream:true});
          const lines=buf.split("\n");buf=lines.pop()||"";
          for(const line of lines){
            if(!line.trim())continue;
            let chunk;try{chunk=JSON.parse(line);}catch{continue;}
            if(chunk.e)throw new Error(chunk.e);
            if(chunk.t){full+=chunk.t;if(onToken)onToken(full);}
          }
        }
        genControllerRef.current=null;
        const clean=full.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim().replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,ch=>'\\u'+ch.charCodeAt(0).toString(16).padStart(4,'0'));
        try{return JSON.parse(clean);}catch{
          const m=clean.match(/\{[\s\S]*\}/);
          if(m){try{return JSON.parse(m[0]);}catch{}}
          const start=clean.indexOf("{");
          if(start>0){try{return JSON.parse(clean.slice(start));}catch{}}
          throw new Error("Response was not valid JSON");
        }
      }catch(e){
        if(e.name==="AbortError"){genControllerRef.current=null;throw new Error("Generation cancelled.");}
        // Retry on network-level errors (TypeError: Failed to fetch, etc.)
        if(e instanceof TypeError&&attempt<MAX_RETRIES){lastErr=e;continue;}
        genControllerRef.current=null;
        throw e;
      }
    }
    genControllerRef.current=null;
    throw lastErr||new Error("Request failed after retries");
  },[currentModel]);

            ctx.beginPath();ctx.rect(cx,cy,CARD_W,IMG_H);ctx.clip();
            // CSS object-fit: cover — scale to fill, center (top-biased for faces)
            const iAspect=img.width/img.height,cAspect=CARD_W/IMG_H;
            let dw,dh,dx,dy;
            if(iAspect>cAspect){dh=IMG_H;dw=dh*iAspect;dx=cx+(CARD_W-dw)/2;dy=cy;}
            else{dw=CARD_W;dh=dw/iAspect;dx=cx;dy=cy;}  // top-aligned: shows head/face first
            ctx.drawImage(img,dx,dy,dw,dh);
            ctx.restore();
            // NO overlays — keep image fully clean for AI reference
          }
        } else {
          ctx.fillStyle=m.color+"18";ctx.fillRect(cx,cy,CARD_W,IMG_H);
          ctx.fillStyle=m.color+"55";ctx.font="bold 80px monospace";ctx.textAlign="center";
          ctx.fillText(m.initials||"??",cx+CARD_W/2,cy+IMG_H/2+28);
        }
        // Accent bar — left edge only, does not overlap image content
        ctx.fillStyle=m.color;ctx.fillRect(cx,cy,4,CARD_H);
        // Card border
        ctx.strokeStyle=m.color+"66";ctx.lineWidth=1;ctx.strokeRect(cx+0.5,cy+0.5,CARD_W-1,CARD_H-1);
        // Info panel — fully below image, dark background
        const ip=cy+IMG_H;
        ctx.fillStyle="#0A0A18";ctx.fillRect(cx+4,ip,CARD_W-4,INFO_H);
        ctx.textAlign="left";
        // Hero name
        ctx.fillStyle="#FFFFFF";ctx.font="bold 17px monospace";
        ctx.fillText(m.heroName||"Unknown",cx+14,ip+24);
        // Real name in accent color
        ctx.fillStyle=m.color;ctx.font="11px monospace";
        ctx.fillText(m.realName||"",cx+14,ip+40);
        // Costume desc — word-wrap 2 lines
        ctx.fillStyle="rgba(255,255,255,0.55)";ctx.font="9.5px monospace";
        const maxTW=CARD_W-28,words=(m.costumeDesc||"").split(" ");
        let cL1="",cL2="",onL2=false;
        for(const w of words){
          if(!onL2){const t=cL1+(cL1?" ":"")+w;if(ctx.measureText(t).width<=maxTW)cL1=t;else{onL2=true;cL2=w;}}
          else{const t=cL2+(cL2?" ":"")+w;if(ctx.measureText(t).width<=maxTW)cL2=t;else break;}
        }
        ctx.fillText(cL1,cx+14,ip+58);
        if(cL2)ctx.fillText(cL2,cx+14,ip+72);
        // Color swatch + hex
        ctx.fillStyle=m.color;ctx.fillRect(cx+14,ip+82,18,11);
        ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=0.5;ctx.strokeRect(cx+14,ip+82,18,11);
        ctx.fillStyle="rgba(255,255,255,0.45)";ctx.font="9px monospace";

        ctx.fillStyle="rgba(255,255,255,0.35)";ctx.font="8.5px monospace";
        const fx=(m.powerFX||m.color+" energy").slice(0,58);
        ctx.fillText("FX: "+fx,cx+14,ip+110);
      }
      await new Promise(res=>canvas.toBlob(blob=>{if(!blob){res();return;}const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=`${activeTeam.name.toLowerCase().replace(/\s+/g,"-")}-reference.png`;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),1000);res();},"image/png"));

          {(!rHeroName.trim()||!rName.trim()||!rRace)&&<div style={{fontSize:10,color:"#E07070",marginBottom:8,fontFamily:"monospace"}}>* Hero Name, Real Name, and Race are required</div>}

            {deepMode?"Begin Deep Forge →":profileMode?"Begin Profile →":"Begin Assessment →"}
          </button>
        </div>)}

        {/* ── Quick mode quiz ── */}
        {!rResult&&!deepMode&&rStep>=1&&rStep<=RECRUIT_QUIZ.length&&rCurrentQ&&(<div style={s.card}>
          <div style={{fontSize:15,fontWeight:"bold",color:"var(--text-primary)",marginBottom:18,lineHeight:1.4}}>{rCurrentQ.question}</div>
          {rCurrentQ.options.map(opt=><button key={opt.id} onClick={()=>{setRAnswers(p=>({...p,[rCurrentQ.id]:opt.id}));if(rStep<RECRUIT_QUIZ.length)setRStep(p=>p+1);}} style={s.optBtn(rAnswers[rCurrentQ.id]===opt.id,rHex)}>{opt.label}</button>)}

            <button onClick={()=>setRStep(p=>Math.max(0,p-1))} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>
            {rStep===RECRUIT_QUIZ.length&&rAnswers[rCurrentQ.id]&&<button onClick={generateRecruit} disabled={rLoading} style={{flex:2,...s.bigBtn(rLoading,rHex),marginTop:0}}>{rLoading?"Forging identity...":"Generate Recruit →"}</button>}
          </div>
        </div>)}

        {/* ── Deep mode phases ── */}
        {!rResult&&deepMode&&deepPhase>=1&&deepPhase<=DEEP_LORE_PHASES.length&&(()=>{
          const ph=DEEP_LORE_PHASES[deepPhase-1];
          const phaseComplete=ph.questions.every(q=>deepAnswers[q.id]);
          const isLast=deepPhase===DEEP_LORE_PHASES.length;
          return(<>
            <DeepLoreQuiz phase={deepPhase-1} answers={deepAnswers} onAnswer={(qid,oid)=>setDeepAnswers(p=>({...p,[qid]:oid}))} accentColor={rHex}/>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>setDeepPhase(p=>Math.max(0,p-1))} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>
              {!isLast&&<button disabled={!phaseComplete} onClick={()=>setDeepPhase(p=>p+1)} style={{flex:2,...s.bigBtn(!phaseComplete,rHex),marginTop:0}}>

              </button>}
              {isLast&&<button disabled={!phaseComplete||rLoading} onClick={generateDeepRecruit} style={{flex:2,...s.bigBtn(!phaseComplete||rLoading,rHex),marginTop:0}}>
                {rLoading?"Deep forging identity...":phaseComplete?"Generate Deep Recruit →":"Answer all questions"}
              </button>}
            </div>
          </>);
        })()}

        {/* ── Personal Profile sections ── */}
        {!rResult&&profileMode&&profileStep>=1&&profileStep<=5&&(()=>{

            <div style={{fontSize:9,letterSpacing:"0.12em",color:`${rHex}88`,textTransform:"uppercase",marginBottom:12}}>{sec.section} · {profileStep} of 5</div>

              <div style={{fontSize:13,fontWeight:"bold",color:"var(--text-primary)",marginBottom:8,lineHeight:1.4}}>{q.q}</div>

            </div>))}
            <div style={{display:"flex",gap:10,marginTop:6}}>
              <button onClick={()=>setProfileStep(p=>Math.max(0,p-1))} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>

              </button>}
              {isLast&&<button disabled={!secComplete||rLoading} onClick={generatePersonalProfile} style={{flex:2,...s.bigBtn(!secComplete||rLoading,rHex),marginTop:0}}>

        {rLoading&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          {aiStreamText&&<div style={{flex:1,padding:"10px 12px",background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,fontFamily:"monospace",fontSize:9,color:"var(--text3)",maxHeight:72,overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.5}}>{aiStreamText}</div>}
          {!aiStreamText&&<div style={{flex:1,padding:"10px 12px",background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,fontSize:9,color:"var(--text3)",fontFamily:"monospace"}}>Waiting for model response…</div>}
          <button onClick={()=>genControllerRef.current?.abort()} style={{flexShrink:0,padding:"8px 14px",background:"rgba(224,112,112,0.1)",border:"1px solid rgba(224,112,112,0.35)",borderRadius:8,cursor:"pointer",color:"#E07070",fontSize:9,fontFamily:"monospace",whiteSpace:"nowrap"}}>✕ Cancel</button>
        </div>}

        {/* ── Result (both modes) ── */}
        {rResult&&!rResult.error&&(<>
          <div style={{marginBottom:12,padding:"12px 16px",background:`${rResult.color}0C`,border:`1px solid ${rResult.color}33`,borderRadius:10,display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:42,height:42,borderRadius:"50%",background:`${rResult.color}18`,border:`1px solid ${rResult.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:"bold",color:rResult.color,flexShrink:0}}>{rResult.initials}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:17,fontWeight:"bold",color:"var(--text-primary)"}}>{rResult.heroName}</div>
              <div style={{fontSize:11,color:rResult.color,marginTop:2}}>{rResult.realName} · {rResult.role}</div>

          </div>

            <button onClick={saveBareRecruit} style={{flex:2,padding:"10px",background:`${activeTeam.color}14`,border:`1px solid ${activeTeam.color}55`,borderRadius:8,cursor:"pointer",color:activeTeam.color,fontSize:10.5,fontFamily:"monospace",letterSpacing:"0.06em"}}>Save Without AI →</button>
          </div>
        </div>)}
      </>)}

      {tab==="villains"&&(<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>

        </div>

        {/* Active villain creator */}
        {(vStep>0||vResult)&&(<>
          <div style={{marginBottom:20}}>
            <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,marginBottom:6}}><div style={{height:3,width:`${vResult?100:(vStep/(VILLAIN_QUIZ.length+1))*100}%`,background:"#8B1A1A",borderRadius:2}}/></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:"var(--text2)"}}>{vResult?"Review villain":`Question ${vStep} of ${VILLAIN_QUIZ.length}`}</span><span style={{fontSize:10,color:"#E07070"}}>{vResult?"Complete":`${Math.round((vStep/(VILLAIN_QUIZ.length+1))*100)}%`}</span></div>
          </div>
          {!vResult&&vStep>=1&&vStep<=VILLAIN_QUIZ.length&&vCurrentQ&&(<div style={s.card}>
            <div style={{fontSize:15,fontWeight:"bold",color:"var(--text-primary)",marginBottom:18,lineHeight:1.4}}>{vCurrentQ.question}</div>
            {vCurrentQ.options.map(opt=><button key={opt.id} onClick={()=>{setVAnswers(p=>({...p,[vCurrentQ.id]:opt.id}));if(vStep<VILLAIN_QUIZ.length)setVStep(p=>p+1);}} style={s.optBtn(vAnswers[vCurrentQ.id]===opt.id,"#8B1A1A")}>{opt.label}</button>)}

            </div>
          </div>)}
          {vLoading&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            {aiStreamText&&<div style={{flex:1,padding:"10px 12px",background:"var(--bg2)",border:"1px solid rgba(139,26,26,0.3)",borderRadius:8,fontFamily:"monospace",fontSize:9,color:"var(--text3)",maxHeight:72,overflowY:"auto",whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.5}}>{aiStreamText}</div>}

          </div>}
          {vResult&&!vResult.error&&(<>
            <CharacterPage member={vResult} imageUrl={null} isVillain={true}/>
            <div style={{display:"flex",gap:10,marginTop:14,marginBottom:20}}>
              <button onClick={()=>{setVResult(null);setVStep(0);setVAnswers({});}} style={{flex:1,padding:"11px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text2)",fontSize:10.5,fontFamily:"monospace"}}>Regenerate</button>
              <button onClick={addVillain} style={{flex:2,padding:"11px",background:"rgba(139,26,26,0.2)",border:"1px solid #8B1A1A",borderRadius:8,cursor:"pointer",color:"#E07070",fontSize:10.5,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"monospace"}}>Add to Pool →</button>
            </div>
          </>)}
          {vResult?.error&&(<div style={{padding:"14px",background:"rgba(192,57,43,0.08)",border:"1px solid rgba(192,57,43,0.28)",borderRadius:10,marginBottom:16}}>

            <div style={{fontSize:10,color:"var(--text3)",marginBottom:14,lineHeight:1.6}}>You can save a basic villain profile now and fill in powers, origin, and stats later via Edit.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setVResult(null);}} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text2)",fontSize:10.5,fontFamily:"monospace"}}>↺ Try Again</button>
              <button onClick={saveBareVillain} style={{flex:2,padding:"10px",background:"rgba(139,26,26,0.15)",border:"1px solid rgba(139,26,26,0.5)",borderRadius:8,cursor:"pointer",color:"#E07070",fontSize:10.5,fontFamily:"monospace",letterSpacing:"0.06em"}}>Save Without AI →</button>
            </div>
          </div>)}
        </>)}

        {vStep===0&&!vResult&&(<>
          {/* Villain creator setup */}

            <span style={s.lbl}>Real Name (optional)</span>
            <input type="text" placeholder="e.g. Marcus Vane" value={vName} onChange={e=>setVName(e.target.value)} style={{marginBottom:10}}/>
            <span style={s.lbl}>Gender</span>
            <select value={vGender} onChange={e=>setVGender(e.target.value)} style={{width:"100%",padding:"8px 10px",background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text-primary)",fontSize:11,marginTop:4,marginBottom:14}}>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Non-binary">Non-binary</option>
              <option value="Other">Other</option>
            </select>
            <span style={s.lbl}>Target Teams (who does this villain threaten?)</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
              {teams.map(t=><button key={t.id} onClick={()=>setVTargetTeams(p=>p.includes(t.id)?p.filter(x=>x!==t.id):[...p,t.id])} style={{display:"flex",alignItems:"center",gap:6,...s.chip(vTargetTeams.includes(t.id),t.color)}}><div style={{width:8,height:8,borderRadius:2,background:t.color,flexShrink:0}}/>{t.abbr}</button>)}
            </div>
            <button style={s.bigBtn(false,"#8B1A1A")} onClick={()=>setVStep(1)}>Begin Threat Assessment →</button>
          </div>

          {/* Existing villain pool */}
          {villainPool.length>0&&(<>
            <div style={{fontSize:9,letterSpacing:"0.2em",color:"rgba(139,26,26,0.7)",textTransform:"uppercase",marginBottom:12}}>Active Threats — {villainPool.length} villain{villainPool.length!==1?"s":""}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {villainPool.map(v=>(<div key={v.id} style={{background:"rgba(139,26,26,0.08)",border:"1px solid rgba(139,26,26,0.25)",borderRadius:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(139,26,26,0.2)",border:"1px solid rgba(139,26,26,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:"bold",color:"#E07070",flexShrink:0}}>{v.initials}</div>
                    <div><div style={{fontSize:13,fontWeight:"bold",color:"var(--text-primary)"}}>{v.heroName}</div><div style={{fontSize:10,color:"var(--text2)"}}>{v.realName} · {v.role}</div></div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>setRedeemingVillain(redeemingVillain===v.id?null:v.id)} style={{fontSize:9,padding:"3px 9px",background:redeemingVillain===v.id?"rgba(93,202,165,0.12)":"var(--bg3)",border:`1px solid ${redeemingVillain===v.id?"rgba(93,202,165,0.4)":"var(--border)"}`,borderRadius:6,cursor:"pointer",color:redeemingVillain===v.id?"#5DCAA5":"var(--text3)",fontFamily:"monospace"}}>Recruit</button>
                    <button onClick={()=>removeVillain(v.id)} style={{fontSize:9,padding:"3px 9px",background:"rgba(163,45,45,0.1)",border:"1px solid rgba(163,45,45,0.28)",borderRadius:6,cursor:"pointer",color:"#e74c3c",fontFamily:"monospace"}}>Remove</button>
                  </div>
                </div>
                <div style={{fontSize:11,color:"var(--text2)",fontStyle:"italic",lineHeight:1.5,marginBottom:8}}>{v.tagline}</div>
                {v.targetTeams&&v.targetTeams.length>0&&(<div>
                  <div style={{fontSize:9,letterSpacing:"0.12em",color:"rgba(139,26,26,0.6)",textTransform:"uppercase",marginBottom:5}}>Targets</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {v.targetTeams.map(tid=>{const t=teams.find(x=>x.id===tid);return t?<span key={tid} style={{fontSize:9,padding:"2px 9px",background:`${t.color}14`,border:`1px solid ${t.color}33`,borderRadius:20,color:t.color}}>{t.abbr} · {t.name}</span>:null;})}
                  </div>
                </div>)}
                {redeemingVillain===v.id&&(<div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"10px 0 2px",alignItems:"center"}}>
                  <span style={{fontSize:9,color:"#5DCAA5",letterSpacing:"0.1em",marginRight:4}}>RECRUIT TO:</span>
                  {teams.map(t=><button key={t.id} onClick={()=>redeemVillain(v,t.id)} style={{fontSize:9,padding:"3px 10px",background:`${t.color}14`,border:`1px solid ${t.color}44`,borderRadius:20,cursor:"pointer",color:t.color,fontFamily:"monospace"}}>{t.name}</button>)}
                  <button onClick={()=>setRedeemingVillain(null)} style={{fontSize:9,padding:"3px 8px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:20,cursor:"pointer",color:"var(--text4)",fontFamily:"monospace"}}>Cancel</button>
                </div>)}
              </div>))}
            </div>
          </>)}
          {villainPool.length===0&&<div style={{textAlign:"center",padding:"30px",color:"var(--text3)",fontSize:12}}>No villains created yet. Every hero team needs an antagonist.</div>}
        </>)}
      </>)}

      {/* ── STORY TAB ─────────────────────────────────────────────────── */}
