  body.forge-light {
    --bg:        #F0ECE2;
    --bg2:       rgba(0,0,0,0.055);
    --bg3:       rgba(0,0,0,0.03);
    --text:      #1C1916;

    --text3:     rgba(28,25,22,0.42);
    --text4:     rgba(28,25,22,0.25);
    --border:    rgba(0,0,0,0.13);
    --border2:   rgba(0,0,0,0.08);
    --header-bg: rgba(240,236,226,0.97);
    --prompt-bg: rgba(0,0,0,0.06);
    --input-bg:  rgba(0,0,0,0.05);
    --shadow:    0 2px 12px rgba(0,0,0,0.15);
    --bg-card2:  #E8E3D6;
    --bg-base:   #F0ECE2;
  }
  body.light-mode {
    --bg:        #F0ECE2; --bg2:rgba(0,0,0,0.055); --bg3:rgba(0,0,0,0.03);
    --text:      #1C1916; --text2:rgba(28,25,22,0.62); --text3:rgba(28,25,22,0.42);
    --text4:     rgba(28,25,22,0.25); --border:rgba(0,0,0,0.13); --border2:rgba(0,0,0,0.08);
    --header-bg: rgba(240,236,226,0.97); --prompt-bg:rgba(0,0,0,0.06); --input-bg:rgba(0,0,0,0.05);
    --shadow:    0 2px 12px rgba(0,0,0,0.15); --bg-card2:#E8E3D6; --bg-base:#F0ECE2;
    --bg-card:rgba(0,0,0,0.04); --bg-card2:#E8E3D6;
  }
  body{background:var(--bg-base);color:var(--text-primary);font-family:'Courier New',monospace;overflow-x:hidden;transition:background 0.25s,color 0.25s;}
  input,button,textarea,select{font-family:'Courier New',monospace;}
  input[type=text],input[type=number],textarea{
    background:var(--bg-card);border:1px solid var(--border);
    border-radius:7px;padding:9px 13px;color:var(--text-primary);font-size:12px;outline:none;width:100%;resize:vertical;
    transition:background 0.2s,border 0.2s,color 0.2s;
  }
  input:focus,textarea:focus{border-color:rgba(212,175,55,0.5);}
  select{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);}
  ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .theme-card{background:var(--bg-card);border:1px solid var(--border);}
  .theme-card2{background:var(--bg-card2);border:1px solid var(--border2);}
  .t-primary{color:var(--text-primary)!important;}
  .t-secondary{color:var(--text-secondary)!important;}
  .t-muted{color:var(--text-muted)!important;}
  .t-faint{color:var(--text-faint)!important;}
</style>
</head>

<script>
window.storage={
  get:async k=>{const v=localStorage.getItem(k);if(v===null)throw new Error("Key not found");return{key:k,value:v};},
  set:async(k,v)=>{const s=typeof v==="string"?v:JSON.stringify(v);localStorage.setItem(k,s);return{key:k,value:s};},
  delete:async k=>{localStorage.removeItem(k);return{key:k,deleted:true};},
  list:async p=>({keys:Object.keys(localStorage).filter(k=>!p||k.startsWith(p))})
};
</script>

const TIER_DEFS=[{id:"S",label:"S",color:"#D4AF37"},{id:"A",label:"A",color:"#5DCAA5"},{id:"B",label:"B",color:"#5EB1FF"},{id:"C",label:"C",color:"#888780"}];

function TeamCreator({teams,onSave,onCancel,callAI,ollamaOk}){
  const[step,setStep]=useState(1);
  const[name,setName]=useState("");
  const[abbr,setAbbr]=useState("");
  const[color,setColor]=useState("#534AB7");
  const[type,setType]=useState("street");
  const[align,setAlign]=useState("neutral");
  const[desc,setDesc]=useState("");
  const[motto,setMotto]=useState("");
  const[origin,setOrigin]=useState("");
  const[genLoading,setGenLoading]=useState(false);
  const autoAbbr=n=>n.split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,3)||"??";
  const handleName=n=>{setName(n);if(!abbr||abbr===autoAbbr(name))setAbbr(autoAbbr(n));};
  const generateLore=async()=>{
    setGenLoading(true);
    try{
      const p=await callAI(`Create lore for a superhero team. JSON only, keys "description", "motto", "origin".\n\nTeam name: ${name}\nType: ${type}\nNK alignment: ${align}\n\n{"description":"1 sentence team description","motto":"short team motto","origin":"2-3 sentence origin story"}`);
      if(p.description)setDesc(p.description);
      if(p.motto)setMotto(p.motto);
      if(p.origin)setOrigin(p.origin);
    }catch(e){}
    setGenLoading(false);
  };
  const handleSave=()=>{
    if(!name.trim())return;
    onSave({id:`team-${Date.now()}`,name:name.trim(),abbr:abbr.trim()||autoAbbr(name),color,colorLight:color+"CC",type,nkAlignment:align,description:desc,motto,origin,isDefault:false,createdAt:Date.now()});
  };
  const s2={padding:"12px 16px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:10};
  const lbl={fontSize:9,letterSpacing:"0.18em",color:"rgba(212,175,55,0.45)",textTransform:"uppercase",marginBottom:8,display:"block"};
  const chip=(a,c=G)=>({padding:"6px 12px",background:a?`${c}16`:"var(--bg3)",border:`1px solid ${a?c:"var(--border2)"}`,borderRadius:20,cursor:"pointer",fontSize:10.5,color:a?c:"var(--text3)",fontFamily:"monospace",fontWeight:a?"bold":"normal"});
  return(<div style={{background:"var(--bg-card2, #07070E)",border:"1px solid rgba(212,175,55,0.2)",borderRadius:14,overflow:"hidden"}}>
    <div style={{background:"rgba(212,175,55,0.06)",borderBottom:"1px solid rgba(212,175,55,0.15)",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontSize:9,letterSpacing:"0.18em",color:`${G}88`,textTransform:"uppercase",marginBottom:2}}>New Team · Step {step} of 3</div><div style={{fontSize:15,fontWeight:"bold",color:"var(--text-primary)"}}>{step===1?"Identity":step===2?"Alignment & Type":"Lore"}</div></div>
      <button onClick={onCancel} style={{padding:"5px 12px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:7,cursor:"pointer",color:"var(--text2)",fontSize:10,fontFamily:"monospace"}}>Cancel</button>
    </div>
    <div style={{padding:"20px"}}>
      {step===1&&(<>
        <div style={{marginBottom:14}}><span style={lbl}>Team Name</span><input type="text" placeholder="e.g. The Iron Covenant" value={name} onChange={e=>handleName(e.target.value)}/></div>
        <div style={{marginBottom:16}}><span style={lbl}>Abbreviation</span><input type="text" placeholder="e.g. TIC" value={abbr} onChange={e=>setAbbr(e.target.value.toUpperCase().slice(0,4))} style={{maxWidth:120}}/></div>
        <span style={lbl}>Team Color</span>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:6}}>
          {TEAM_COLORS.map(tc=><button key={tc.id} onClick={()=>setColor(tc.hex)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:color===tc.hex?`${tc.hex}18`:"var(--bg3)",border:`1px solid ${color===tc.hex?tc.hex:"var(--border2)"}`,borderRadius:20,cursor:"pointer",fontFamily:"monospace",fontSize:10.5,color:color===tc.hex?"var(--text-primary)":"var(--text3)"}}><div style={{width:10,height:10,borderRadius:"50%",background:tc.hex,flexShrink:0}}/>{tc.label}</button>)}
        </div>
        <button disabled={!name.trim()} onClick={()=>setStep(2)} style={{width:"100%",padding:"12px",background:name.trim()?`${G}14`:"var(--bg3)",border:`1px solid ${name.trim()?G:"var(--border2)"}`,borderRadius:8,cursor:name.trim()?"pointer":"not-allowed",color:name.trim()?G:"var(--text4)",fontSize:10.5,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"monospace",marginTop:14}}>Next →</button>
      </>)}
      {step===2&&(<>
        <span style={lbl}>Team Type</span>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>{TEAM_TYPES.map(tt=><button key={tt.id} style={chip(type===tt.id,color)} onClick={()=>setType(tt.id)}>{tt.label}</button>)}</div>
        <span style={lbl}>NK Alignment</span>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {NK_ALIGNMENTS.map(a=><button key={a.id} onClick={()=>setAlign(a.id)} style={{padding:"10px 14px",background:align===a.id?`${a.color}14`:"var(--bg3)",border:`1px solid ${align===a.id?a.color:"var(--border2)"}`,borderRadius:9,cursor:"pointer",textAlign:"left",fontFamily:"monospace"}}>
            <div style={{fontSize:12,color:align===a.id?"var(--text-primary)":"var(--text2)",fontWeight:align===a.id?"bold":"normal"}}>{a.label}</div>
            <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{a.desc}</div>
          </button>)}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setStep(1)} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>
          <button onClick={()=>setStep(3)} style={{flex:2,padding:"10px",background:`${color}14`,border:`1px solid ${color}`,borderRadius:8,cursor:"pointer",color,fontSize:10.5,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"monospace"}}>Next →</button>
        </div>
      </>)}
      {step===3&&(<>
        <div style={{marginBottom:12}}><span style={lbl}>Description (optional)</span><input type="text" placeholder="One sentence about this team" value={desc} onChange={e=>setDesc(e.target.value)}/></div>
        <div style={{marginBottom:12}}><span style={lbl}>Motto (optional)</span><input type="text" placeholder="Team motto or battle cry" value={motto} onChange={e=>setMotto(e.target.value)}/></div>
        <div style={{marginBottom:16}}><span style={lbl}>Origin (optional)</span><textarea style={{height:70}} placeholder="Team backstory..." value={origin} onChange={e=>setOrigin(e.target.value)}/></div>
        {ollamaOk&&<button onClick={generateLore} disabled={genLoading} style={{width:"100%",padding:"10px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,cursor:genLoading?"not-allowed":"pointer",color:"var(--text2)",fontSize:10.5,fontFamily:"monospace",marginBottom:14}}>{genLoading?"Generating lore...":"✦ Auto-generate lore with AI"}</button>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setStep(2)} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>
          <button onClick={handleSave} style={{flex:2,padding:"10px",background:`${color}18`,border:`1px solid ${color}`,borderRadius:8,cursor:"pointer",color,fontSize:10.5,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"monospace"}}>Create Team →</button>
        </div>
      </>)}
    </div>
  </div>);
}

function DeepLoreQuiz({phase,answers,onAnswer,accentColor}){
  const phaseData=DEEP_LORE_PHASES[phase];
  if(!phaseData)return null;
  const c=accentColor||"#534AB7";
  return(<div style={{background:"var(--bg3)",border:`1px solid ${c}33`,borderRadius:10,padding:"20px"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
      <div style={{width:22,height:22,borderRadius:"50%",background:`${c}22`,border:`1px solid ${c}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:"bold",color:c,flexShrink:0}}>{phaseData.phase}</div>
      <div><div style={{fontSize:15,fontWeight:"bold",color:"var(--text-primary)"}}>{phaseData.title}</div><div style={{fontSize:10,color:"var(--text2)",marginTop:1}}>{phaseData.subtitle}</div></div>
    </div>
    <div style={{width:"100%",height:1,background:`${c}22`,margin:"14px 0"}}/>
    {phaseData.questions.map((q,qi)=>(<div key={q.id} style={{marginBottom:qi<phaseData.questions.length-1?20:0}}>
      <div style={{fontSize:12,color:"var(--text2)",marginBottom:10,lineHeight:1.4}}>{q.label}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {q.options.map(opt=>{
          const sel=answers[q.id]===opt.id;
          return(<button key={opt.id} onClick={()=>onAnswer(q.id,opt.id)} style={{padding:"9px 14px",background:sel?`${c}18`:"rgba(255,255,255,0.02)",border:`1px solid ${sel?c:"var(--border2)"}`,borderRadius:8,cursor:"pointer",color:sel?"var(--text-primary)":"var(--text2)",fontFamily:"monospace",fontSize:11.5,textAlign:"left",transition:"all 0.12s",fontWeight:sel?"bold":"normal"}}>
            {sel&&<span style={{color:c,marginRight:7}}>▸</span>}{opt.label}
          </button>);
        })}
      </div>
    </div>))}
  </div>);
}

  },[lightMode]);
  const[copied,setCopied]=useState({});
  const fileRefs=useRef({});

  // ── Ollama check ─────────────────────────────────────────────────────────
  const checkOllama=useCallback(()=>{

  },[]);
  useEffect(()=>{checkOllama();const t=setInterval(checkOllama,10000);return()=>clearInterval(t);},[checkOllama]);

  // ── Persistence ──────────────────────────────────────────────────────────
  useEffect(()=>{
    (async()=>{
      try{const d=await window.storage.get("forge-teams");const saved=JSON.parse(d.value);if(saved&&saved.length)setTeams([NK_TEAM,...saved.filter(t=>!t.isDefault)]);}catch(e){}
      try{const d=await window.storage.get("forge-rosters");setTeamRosters(JSON.parse(d.value)||{});}catch(e){}
      try{const d=await window.storage.get("forge-edits");setSharedEdits(JSON.parse(d.value)||{});}catch(e){
        // backward compat: check old key
        try{const d2=await window.storage.get("nk-edits");setSharedEdits(JSON.parse(d2.value)||{});}catch(e2){}
      }
      try{const d=await window.storage.get("forge-villains");setVillainPool(JSON.parse(d.value)||[]);}catch(e){
        try{const d2=await window.storage.get("nk-villain");const v=JSON.parse(d2.value);if(v)setVillainPool([v]);}catch(e2){}
      }
      // old NK recruits backward compat
      try{const d=await window.storage.get("nk-recruits");const rec=JSON.parse(d.value)||[];if(rec.length){setTeamRosters(p=>({...p,"nocturnal-knights":[...(p["nocturnal-knights"]||[]),...rec.map(r=>({...r,teamId:"nocturnal-knights"}))]}))};}catch(e){}
      try{const d=await window.storage.get("forge-meta-ai-pref");if(d)setHasMetaAI(JSON.parse(d.value));}catch(e){}
      try{const d=await window.storage.get("forge-removed");setRemovedMembers(JSON.parse(d.value)||{});}catch(e){}
      try{const r=await fetch("/api/images");const ids=await r.json();const loaded={};const t=Date.now();ids.forEach(id=>{loaded[id]=`/api/images/${id}?t=${t}`;});if(Object.keys(loaded).length)setImages(loaded);}catch(e){}
      try{const r=await fetch("/api/update/check");setUpdateInfo(await r.json());}catch(e){}
      try{const r=await fetch("/api/remote");setRemoteInfo(await r.json());}catch(e){}
    })();
  },[]);

  const persist=useCallback(async(key,data)=>{
    try{await window.storage.set(key,JSON.stringify(data));setSaved(true);setTimeout(()=>setSaved(false),2000);}catch(e){}
  },[]);

  // ── Computed ─────────────────────────────────────────────────────────────
  const activeTeam=useMemo(()=>teams.find(t=>t.id===activeTeamId)||NK_TEAM,[teams,activeTeamId]);

  const getTeamRoster=useCallback((teamId)=>{
    const removed=removedMembers[teamId]||[];
    const custom=(teamRosters[teamId]||[]).filter(m=>!removed.includes(m.id));
    if(teamId==="nocturnal-knights"){
      return[...DEFAULT_NK.filter(m=>!removed.includes(m.id)).map(m=>sharedEdits[m.id]?{...m,...sharedEdits[m.id]}:m),...custom.map(m=>sharedEdits[m.id]?{...m,...sharedEdits[m.id]}:m)];
    }
    return custom.map(m=>sharedEdits[m.id]?{...m,...sharedEdits[m.id]}:m);
  },[teamRosters,sharedEdits,removedMembers]);

  const activeRoster=useMemo(()=>getTeamRoster(activeTeamId),[getTeamRoster,activeTeamId]);

  const allCharacters=useMemo(()=>teams.flatMap(t=>getTeamRoster(t.id)),[teams,getTeamRoster]);

  const getTeamMemberCount=useCallback((teamId)=>getTeamRoster(teamId).length,[getTeamRoster]);

  // ── Team management ───────────────────────────────────────────────────────
  const saveTeam=useCallback((teamData)=>{
    const newTeams=editingTeamData
      ?teams.map(t=>t.id===editingTeamData.id?{...t,...teamData}:t)
      :[...teams,teamData];
    setTeams(newTeams);
    persist("forge-teams",newTeams.filter(t=>!t.isDefault));
    setShowTeamCreator(false);setEditingTeamData(null);
  },[teams,editingTeamData,persist]);

  const deleteTeam=useCallback((teamId)=>{
    if(teamId==="nocturnal-knights")return;
    const newTeams=teams.filter(t=>t.id!==teamId);
    setTeams(newTeams);
    persist("forge-teams",newTeams.filter(t=>!t.isDefault));
    if(activeTeamId===teamId)setActiveTeamId("nocturnal-knights");
  },[teams,activeTeamId,persist]);

  // ── Character management ──────────────────────────────────────────────────
  const handleImg=useCallback((id,file)=>{
    if(!file||!file.type.startsWith("image/"))return;
    const reader=new FileReader();
    reader.onload=async e=>{
      const b64=e.target.result;
      try{await fetch(`/api/images/${id}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:b64})});setImages(p=>({...p,[id]:`/api/images/${id}?t=${Date.now()}`}));}catch(err){}
    };
    reader.readAsDataURL(file);
  },[]);
  const toggle=useCallback(id=>setExpanded(p=>({...p,[id]:!p[id]})),[]);

  const saveCharEdit=useCallback((id,data)=>{
    const ne={...sharedEdits,[id]:data};
    setSharedEdits(ne);
    setEditingChar(p=>({...p,[id]:false}));
    persist("forge-edits",ne);
  },[sharedEdits,persist]);

  const removeMember=useCallback((teamId,member)=>{
    fetch(`/api/images/${member.id}`,{method:"DELETE"}).catch(()=>{});
    setImages(p=>{const n={...p};delete n[member.id];return n;});
    if(member.isCore){
      const nr={...removedMembers,[teamId]:[...(removedMembers[teamId]||[]),member.id]};
      setRemovedMembers(nr);persist("forge-removed",nr);
    }else{
      const newCustom=(teamRosters[teamId]||[]).filter(m=>m.id!==member.id);
      const newRosters={...teamRosters,[teamId]:newCustom};
      setTeamRosters(newRosters);persist("forge-rosters",newRosters);
    }
  },[removedMembers,teamRosters,persist]);

  const switchMemberTeam=useCallback((member,targetTeamId)=>{
    let nr={...teamRosters};
    let nrem={...removedMembers};
    const src=member.teamId||activeTeamId;
    if(member.isCore){nrem[src]=[...(nrem[src]||[]),member.id];setRemovedMembers(nrem);persist("forge-removed",nrem);}
    else{nr[src]=(nr[src]||[]).filter(m=>m.id!==member.id);}
    nr[targetTeamId]=[...(nr[targetTeamId]||[]),{...member,teamId:targetTeamId,isCore:false}];
    setTeamRosters(nr);persist("forge-rosters",nr);setSwitchingMember(null);
  },[teamRosters,removedMembers,activeTeamId,persist]);

  const flipToVillain=useCallback((member)=>{
    let nr={...teamRosters};
    let nrem={...removedMembers};
    const src=member.teamId||activeTeamId;
    if(member.isCore){nrem[src]=[...(nrem[src]||[]),member.id];setRemovedMembers(nrem);persist("forge-removed",nrem);}
    else{nr[src]=(nr[src]||[]).filter(m=>m.id!==member.id);setTeamRosters(nr);persist("forge-rosters",nr);}
    const v={...member,isVillain:true,targetTeams:[src],nkAlignment:"enemy"};
    const nv=[...villainPool,v];setVillainPool(nv);persist("forge-villains",nv);setSwitchingMember(null);
  },[teamRosters,removedMembers,activeTeamId,villainPool,persist]);

  const redeemVillain=useCallback((villain,targetTeamId)=>{
    const nv=villainPool.filter(v=>v.id!==villain.id);

    delete hero.isVillain;
    const nr={...teamRosters,[targetTeamId]:[...(teamRosters[targetTeamId]||[]),hero]};

    try{return JSON.parse(clean);}catch{const m=clean.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);throw new Error("Response was not valid JSON");}

      const num=String(activeRoster.length+1).padStart(2,"0");
      setRResult({id:`char-${Date.now()}`,teamId:activeTeamId,realName:rName||"Unknown",color:hex,colorLight:hex+"CC",initials:rName?rName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase():"??",number:num,isCustom:true,nkAlignment:rNkAlign,...p});
    }catch(e){setRResult({error:true,msg:e.message});}

  const addRecruit=()=>{
    if(!rResult||rResult.error)return;

    setTeamRosters(newRosters);
    persist("forge-rosters",newRosters);
    setRResult(null);setRAnswers({});setRName("");setRStep(0);setRNkAlign("neutral");setDeepAnswers({});setDeepPhase(0);setTab("roster");
  };

  const generateDeepRecruit=async()=>{
    setRLoading(true);setRResult(null);
    const hex=ACCENT_COLORS.find(a=>a.id===rAccent)?.hex||"#A32D2D";
    const existingNames=activeRoster.map(m=>m.heroName).join(", ");
    // Build rich context from deep lore answers
    const loreContext=DEEP_LORE_PHASES.map(ph=>{
      return ph.questions.map(q=>{
        const opt=q.options?.find(o=>o.id===deepAnswers[q.id]);
        return opt?`${q.label.replace("?","")}: ${opt.label}`:"";
      }).filter(Boolean).join("\n");
    }).filter(Boolean).join("\n");
    const freeText=[deepAnswers.visualRef,deepAnswers.mustHave].filter(Boolean).join(". ");
    try{
      const p=await callAI(`Create a deeply developed ${activeTeam.name} hero using rich comic book lore. JSON only.\n\nReal name: ${rName||"Unknown"}\nAccent color: ${hex}\nNK alignment: ${rNkAlign}\nExisting names (must be different): ${existingNames||"none"}\nTeam: ${activeTeam.name}\n\nLore profile:\n${loreContext}${freeText?"\nVisual references: "+freeText:""}\n\nUse this lore to create a hero that feels authentic to these inspirations. JSON:\n{"heroName":"2-word hero name, distinct and fitting the lore profile","tagline":"one piercing sentence that captures their essence","role":"Role · Descriptor","origin":"3-4 sentences backstory that directly reflects the lore answers — specific, not generic","powers":[{"name":"Power name matching their visual style","desc":"2-sentence visual description of exactly how this looks in action"},{"name":"Power name","desc":"visual desc"},{"name":"Power name","desc":"visual desc"},{"name":"Power name","desc":"visual desc"}],"stats":{"Power":75,"Speed":70,"Tech":60,"Intellect":80,"Will":85},"costumeDesc":"Detailed costume description using ${hex} accent, reflecting their costume philosophy answer","powerFX":"Exact visual description of power effects using ${hex}, matching their FX style answer","consistencyNotes":"2-3 specific design lock rules based on their visual choices","dna":["3 specific character inspirations drawn from their answers"]}`);
      const num=String(activeRoster.length+1).padStart(2,"0");
      setRResult({id:`char-${Date.now()}`,teamId:activeTeamId,realName:rName||"Unknown",color:hex,colorLight:hex+"CC",initials:rName?rName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase():"??",number:num,isCustom:true,nkAlignment:rNkAlign,deepLore:deepAnswers,...p});
    }catch(e){setRResult({error:true,msg:e.message});}
    setRLoading(false);
  };

  const generateTripo3D=async(member)=>{
    setTripo3DTarget(member.id);setTripo3DLoading(true);setTripo3DPrompt(null);
    try{
      const p=await callAI(`Generate a Tripo3D 3D model prompt for this character. JSON only, key "prompt".\n\nCharacter: ${member.heroName}\nCostume: ${member.costumeDesc||"dramatic suit"}\nPower FX: ${member.powerFX||"energy effects"}\nAccent color: ${member.color}\n\n{"prompt":"2-3 sentence Tripo3D prompt. Describe as a 3D model: full-body character standing in neutral A-pose or slight heroic stance. Mention separate color regions for multi-filament FDM printing. Mention watertight mesh, clean topology, no floating geometry. Include character-specific details like costume elements, weapon accessories, or power effect attachments that print as separate pieces."}`);
      setTripo3DPrompt(p.prompt||"Generation failed.");
    }catch(e){setTripo3DPrompt("Generation failed: "+e.message);}
    setTripo3DLoading(false);
  };

  // ── Villain pool ──────────────────────────────────────────────────────────
  const generateVillain=async()=>{
    setVLoading(true);setVResult(null);
    const answers=VILLAIN_QUIZ.map(q=>{const opt=q.options.find(o=>o.id===vAnswers[q.id]);return`${q.question}: ${opt?.value||""}`;}).join("\n");
    const targetNames=vTargetTeams.map(id=>teams.find(t=>t.id===id)?.name||id).join(", ")||"The Nocturnal Knights";

        {pResult&&!pResult.error&&(<div style={{...s.card,marginTop:16}}>

          {pResult.metaAI&&<><span style={s.lbl}>Meta AI Image Prompt</span><div style={s.pBox}>{pResult.metaAI}</div>{hasMetaAI?<MetaAILauncher prompt={pResult.metaAI} label="Meta AI" copied={copied.pmeta} onCopy={()=>copy("pmeta",pResult.metaAI)}/>:<div style={{display:"flex",justifyContent:"flex-end",marginTop:6,marginBottom:12}}><button style={s.cpyBtn(copied.pmeta)} onClick={()=>copy("pmeta",pResult.metaAI)}>{copied.pmeta?"Copied!":"Copy"}</button></div>}</>}
          {pResult.tripo3D&&<><span style={s.lbl}>Tripo3D Model Prompt</span><div style={s.pBox}>{pResult.tripo3D}</div><Tripo3DLauncher prompt={pResult.tripo3D} copied={copied.ptripo} onCopy={()=>copy("ptripo",pResult.tripo3D)}/></>}
        </div>)}
        {pResult?.error&&<div style={{marginTop:12,padding:"12px",background:"rgba(192,57,43,0.1)",border:"1px solid rgba(192,57,43,0.28)",borderRadius:8,fontSize:11,color:"#e74c3c"}}>Failed: {pResult.msg}</div>}
      </>)}

      {/* ── RECRUIT TAB ───────────────────────────────────────────────── */}
      {tab==="recruit"&&(<>
        <div style={{padding:"10px 14px",background:`${activeTeam.color}0A`,border:`1px solid ${activeTeam.color}33`,borderRadius:8,fontSize:11,color:"var(--text2)",marginBottom:18}}>
          Recruiting for: <strong style={{color:activeTeam.color}}>{activeTeam.name}</strong> · Switch teams in the Teams tab to recruit for a different team.
        </div>
        {/* Quick / Deep mode toggle */}
        <div style={{display:"flex",gap:8,marginBottom:18}}>
          <button onClick={()=>{setDeepMode(false);setDeepPhase(0);setDeepAnswers({});setRStep(0);setRResult(null);}} style={{flex:1,padding:"10px",background:!deepMode?`${activeTeam.color}16`:"var(--bg3)",border:`1px solid ${!deepMode?activeTeam.color:"var(--border2)"}`,borderRadius:9,cursor:"pointer",fontFamily:"monospace",textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:!deepMode?"bold":"normal",color:!deepMode?"var(--text-primary)":"var(--text2)"}}>⚡ Quick Forge</div>
            <div style={{fontSize:9,color:"var(--text3)",marginTop:2}}>6 questions, fast result</div>
          </button>
          <button onClick={()=>{setDeepMode(true);setDeepPhase(0);setDeepAnswers({});setRStep(0);setRResult(null);}} style={{flex:1,padding:"10px",background:deepMode?`${activeTeam.color}16`:"var(--bg3)",border:`1px solid ${deepMode?activeTeam.color:"var(--border2)"}`,borderRadius:9,cursor:"pointer",fontFamily:"monospace",textAlign:"center"}}>
            <div style={{fontSize:12,fontWeight:deepMode?"bold":"normal",color:deepMode?"var(--text-primary)":"var(--text2)"}}>📚 Deep Forge</div>
            <div style={{fontSize:9,color:"var(--text3)",marginTop:2}}>7 lore phases, richer result</div>
          </button>
        </div>
        <div style={{marginBottom:20}}>
          {/* Progress bar */}
          <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,marginBottom:6}}>
            <div style={{height:3,background:activeTeam.color,borderRadius:2,transition:"width 0.3s ease",
              width:rResult?"100%":deepMode
                ?`${(deepPhase/(DEEP_LORE_PHASES.length+1))*100}%`
                :`${(rStep/(RECRUIT_QUIZ.length+1))*100}%`
            }}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:10,color:"var(--text2)"}}>
              {rResult?"Review recruit":deepMode
                ?(deepPhase===0?"Identity":`Phase ${deepPhase} of ${DEEP_LORE_PHASES.length} — ${DEEP_LORE_PHASES[deepPhase-1]?.title||""}`)
                :(rStep===0?"Identity":`Question ${rStep} of ${RECRUIT_QUIZ.length}`)
              }
            </span>
            <span style={{fontSize:10,color:activeTeam.color}}>
              {rResult?"Complete":deepMode
                ?`${Math.round((deepPhase/(DEEP_LORE_PHASES.length+1))*100)}%`
                :`${Math.round((rStep/(RECRUIT_QUIZ.length+1))*100)}%`
              }
            </span>
          </div>
        </div>

        {/* ── Step 0: Identity (both modes) ── */}
        {!rResult&&((!deepMode&&rStep===0)||(deepMode&&deepPhase===0))&&(<div style={s.card}>
          <div style={{fontSize:15,fontWeight:"bold",color:"var(--text-primary)",marginBottom:14}}>Who is this recruit?</div>
          <span style={s.lbl}>Real Name (optional)</span>
          <input type="text" placeholder="e.g. Devon Marshall" value={rName} onChange={e=>setRName(e.target.value)} style={{marginBottom:16}}/>
          <span style={s.lbl}>Accent Color</span>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:deepMode?18:0}}>
            {ACCENT_COLORS.map(ac=><button key={ac.id} onClick={()=>setRAccent(ac.id)} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 12px",background:rAccent===ac.id?`${ac.hex}18`:"var(--bg3)",border:`1px solid ${rAccent===ac.id?ac.hex:"var(--border2)"}`,borderRadius:20,cursor:"pointer",fontFamily:"monospace",fontSize:11,color:rAccent===ac.id?"var(--text-primary)":"var(--text2)"}}><div style={{width:10,height:10,borderRadius:"50%",background:ac.hex,flexShrink:0}}/>{ac.label}</button>)}
          </div>
          {deepMode&&(<>
            <span style={{...s.lbl,marginTop:14}}>Visual References (optional)</span>
            <input type="text" placeholder="e.g. Batman's silhouette, Vegeta's stance, Trunks' sword" value={deepAnswers.visualRef||""} onChange={e=>setDeepAnswers(p=>({...p,visualRef:e.target.value}))} style={{marginBottom:12}}/>
            <span style={s.lbl}>Must-Have Visual Elements (optional)</span>
            <input type="text" placeholder="e.g. always has a hood, scar on right eye, mechanical left arm" value={deepAnswers.mustHave||""} onChange={e=>setDeepAnswers(p=>({...p,mustHave:e.target.value}))}/>
          </>)}
          {activeTeamId!=="nocturnal-knights"&&(<>
            <span style={{...s.lbl,marginTop:14}}>NK Alignment</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:6}}>
              {[{id:"neutral",label:"Neutral",color:"#888780"},...NK_ALIGNMENTS].map(a=><button key={a.id} onClick={()=>setRNkAlign(a.id)} style={{fontSize:9,padding:"4px 11px",background:rNkAlign===a.id?`${a.color}18`:"var(--bg3)",border:`1px solid ${rNkAlign===a.id?a.color:"var(--border2)"}`,borderRadius:20,cursor:"pointer",color:rNkAlign===a.id?a.color:"var(--text2)",fontFamily:"monospace"}}>{a.label}</button>)}
            </div>
          </>)}
          <button style={s.bigBtn(false,activeTeam.color)} onClick={()=>deepMode?setDeepPhase(1):setRStep(1)}>
            {deepMode?"Begin Deep Forge →":"Begin Assessment →"}
          </button>
        </div>)}

        {/* ── Quick mode quiz ── */}
        {!rResult&&!deepMode&&rStep>=1&&rStep<=RECRUIT_QUIZ.length&&rCurrentQ&&(<div style={s.card}>
          <div style={{fontSize:15,fontWeight:"bold",color:"var(--text-primary)",marginBottom:18,lineHeight:1.4}}>{rCurrentQ.question}</div>
          {rCurrentQ.options.map(opt=><button key={opt.id} onClick={()=>{setRAnswers(p=>({...p,[rCurrentQ.id]:opt.id}));if(rStep<RECRUIT_QUIZ.length)setRStep(p=>p+1);}} style={s.optBtn(rAnswers[rCurrentQ.id]===opt.id,rHex)}>{opt.label}</button>)}
          <div style={{display:"flex",gap:10,marginTop:10}}>
            <button onClick={()=>setRStep(p=>Math.max(0,p-1))} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>
            {rStep===RECRUIT_QUIZ.length&&rAnswers[rCurrentQ.id]&&<button onClick={generateRecruit} disabled={rLoading} style={{flex:2,...s.bigBtn(rLoading,rHex),marginTop:0}}>{rLoading?"Forging identity...":"Generate Recruit →"}</button>}
          </div>
        </div>)}

        {/* ── Deep mode phases ── */}
        {!rResult&&deepMode&&deepPhase>=1&&deepPhase<=DEEP_LORE_PHASES.length&&(()=>{
          const ph=DEEP_LORE_PHASES[deepPhase-1];
          const phaseComplete=ph.questions.every(q=>deepAnswers[q.id]);
          const isLast=deepPhase===DEEP_LORE_PHASES.length;
          return(<>
            <DeepLoreQuiz phase={deepPhase-1} answers={deepAnswers} onAnswer={(qid,oid)=>setDeepAnswers(p=>({...p,[qid]:oid}))} accentColor={rHex}/>
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={()=>setDeepPhase(p=>Math.max(0,p-1))} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>
              {!isLast&&<button disabled={!phaseComplete} onClick={()=>setDeepPhase(p=>p+1)} style={{flex:2,...s.bigBtn(!phaseComplete,rHex),marginTop:0}}>
                {phaseComplete?`Next: ${DEEP_LORE_PHASES[deepPhase]?.title||"Generate"} →`:"Answer all questions to continue"}
              </button>}
              {isLast&&<button disabled={!phaseComplete||rLoading} onClick={generateDeepRecruit} style={{flex:2,...s.bigBtn(!phaseComplete||rLoading,rHex),marginTop:0}}>
                {rLoading?"Deep forging identity...":phaseComplete?"Generate Deep Recruit →":"Answer all questions"}
              </button>}
            </div>
          </>);
        })()}

        {/* ── Result (both modes) ── */}
        {rResult&&!rResult.error&&(<>
          <div style={{marginBottom:12,padding:"12px 16px",background:`${rResult.color}0C`,border:`1px solid ${rResult.color}33`,borderRadius:10,display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:42,height:42,borderRadius:"50%",background:`${rResult.color}18`,border:`1px solid ${rResult.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:"bold",color:rResult.color,flexShrink:0}}>{rResult.initials}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:17,fontWeight:"bold",color:"var(--text-primary)"}}>{rResult.heroName}</div>
              <div style={{fontSize:11,color:rResult.color,marginTop:2}}>{rResult.realName} · {rResult.role}</div>
              {rResult.deepLore&&<div style={{fontSize:9,color:`${rResult.color}88`,marginTop:3,letterSpacing:"0.08em"}}>DEEP FORGE · {DEEP_LORE_PHASES.length} phases</div>}
            </div>
            {rResult.nkAlignment&&rResult.nkAlignment!=="base"&&<AlignmentBadge alignment={rResult.nkAlignment}/>}
          </div>
          <CharacterPage member={rResult} imageUrl={null} teamName={activeTeam.name} teamColor={activeTeam.color}/>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button onClick={()=>{setRResult(null);setRStep(0);setRAnswers({});setDeepPhase(0);setDeepAnswers({});}} style={{flex:1,padding:"11px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text2)",fontSize:10.5,fontFamily:"monospace"}}>Regenerate</button>
            <button onClick={addRecruit} style={{flex:2,padding:"11px",background:`${activeTeam.color}16`,border:`1px solid ${activeTeam.color}`,borderRadius:8,cursor:"pointer",color:activeTeam.color,fontSize:10.5,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"monospace"}}>Add to {activeTeam.abbr} →</button>
          </div>
        </>)}
        {rResult?.error&&<div style={{padding:"12px",background:"rgba(192,57,43,0.1)",border:"1px solid rgba(192,57,43,0.28)",borderRadius:8,fontSize:11,color:"#e74c3c"}}>Generation failed: {rResult.msg}</div>}
      </>)}

      {/* ── VILLAINS TAB ──────────────────────────────────────────────── */}
      {tab==="villains"&&(<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div><div style={{fontSize:9,letterSpacing:"0.2em",color:"rgba(139,26,26,0.7)",textTransform:"uppercase",marginBottom:4}}>Villain Pool</div><div style={{fontSize:12,color:"var(--text2)"}}>Villains can threaten multiple teams. Create once, assign anywhere.</div></div>
        </div>

        {/* Active villain creator */}
        {(vStep>0||vResult)&&(<>
          <div style={{marginBottom:20}}>
            <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,marginBottom:6}}><div style={{height:3,width:`${vResult?100:(vStep/(VILLAIN_QUIZ.length+1))*100}%`,background:"#8B1A1A",borderRadius:2}}/></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:"var(--text2)"}}>{vResult?"Review villain":`Question ${vStep} of ${VILLAIN_QUIZ.length}`}</span><span style={{fontSize:10,color:"#E07070"}}>{vResult?"Complete":`${Math.round((vStep/(VILLAIN_QUIZ.length+1))*100)}%`}</span></div>
          </div>
          {!vResult&&vStep>=1&&vStep<=VILLAIN_QUIZ.length&&vCurrentQ&&(<div style={s.card}>
            <div style={{fontSize:15,fontWeight:"bold",color:"var(--text-primary)",marginBottom:18,lineHeight:1.4}}>{vCurrentQ.question}</div>
            {vCurrentQ.options.map(opt=><button key={opt.id} onClick={()=>{setVAnswers(p=>({...p,[vCurrentQ.id]:opt.id}));if(vStep<VILLAIN_QUIZ.length)setVStep(p=>p+1);}} style={s.optBtn(vAnswers[vCurrentQ.id]===opt.id,"#8B1A1A")}>{opt.label}</button>)}
            <div style={{display:"flex",gap:10,marginTop:10}}>
              <button onClick={()=>{if(vStep===1){setVStep(0);}else setVStep(p=>p-1);}} style={{flex:1,padding:"10px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text3)",fontSize:10.5,fontFamily:"monospace"}}>← Back</button>
              {vStep===VILLAIN_QUIZ.length&&vAnswers[vCurrentQ.id]&&<button onClick={generateVillain} disabled={vLoading} style={{flex:2,...s.bigBtn(vLoading,"#8B1A1A"),marginTop:0}}>{vLoading?"Forging threat...":"Generate Villain →"}</button>}
            </div>
          </div>)}
          {vResult&&!vResult.error&&(<>
            <CharacterPage member={vResult} imageUrl={null} isVillain={true}/>
            <div style={{display:"flex",gap:10,marginTop:14,marginBottom:20}}>
              <button onClick={()=>{setVResult(null);setVStep(0);setVAnswers({});}} style={{flex:1,padding:"11px",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:8,cursor:"pointer",color:"var(--text2)",fontSize:10.5,fontFamily:"monospace"}}>Regenerate</button>
              <button onClick={addVillain} style={{flex:2,padding:"11px",background:"rgba(139,26,26,0.2)",border:"1px solid #8B1A1A",borderRadius:8,cursor:"pointer",color:"#E07070",fontSize:10.5,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"monospace"}}>Add to Pool →</button>
            </div>
          </>)}
          {vResult?.error&&<div style={{padding:"12px",background:"rgba(192,57,43,0.1)",border:"1px solid rgba(192,57,43,0.28)",borderRadius:8,fontSize:11,color:"#e74c3c",marginBottom:16}}>Generation failed: {vResult.msg}</div>}
        </>)}

        {vStep===0&&!vResult&&(<>
          {/* Villain creator setup */}
          <div style={{...s.card,marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:"bold",color:"var(--text-primary)",marginBottom:12}}>Create New Villain</div>
            <span style={s.lbl}>Real Name (optional)</span>
            <input type="text" placeholder="e.g. Marcus Vane" value={vName} onChange={e=>setVName(e.target.value)} style={{marginBottom:14}}/>
            <span style={s.lbl}>Target Teams (who does this villain threaten?)</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
              {teams.map(t=><button key={t.id} onClick={()=>setVTargetTeams(p=>p.includes(t.id)?p.filter(x=>x!==t.id):[...p,t.id])} style={{display:"flex",alignItems:"center",gap:6,...s.chip(vTargetTeams.includes(t.id),t.color)}}><div style={{width:8,height:8,borderRadius:2,background:t.color,flexShrink:0}}/>{t.abbr}</button>)}
            </div>
            <button style={s.bigBtn(false,"#8B1A1A")} onClick={()=>setVStep(1)}>Begin Threat Assessment →</button>
          </div>

          {/* Existing villain pool */}
          {villainPool.length>0&&(<>
            <div style={{fontSize:9,letterSpacing:"0.2em",color:"rgba(139,26,26,0.7)",textTransform:"uppercase",marginBottom:12}}>Active Threats — {villainPool.length} villain{villainPool.length!==1?"s":""}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {villainPool.map(v=>(<div key={v.id} style={{background:"rgba(139,26,26,0.08)",border:"1px solid rgba(139,26,26,0.25)",borderRadius:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(139,26,26,0.2)",border:"1px solid rgba(139,26,26,0.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:"bold",color:"#E07070",flexShrink:0}}>{v.initials}</div>
                    <div><div style={{fontSize:13,fontWeight:"bold",color:"var(--text-primary)"}}>{v.heroName}</div><div style={{fontSize:10,color:"var(--text2)"}}>{v.realName} · {v.role}</div></div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>setRedeemingVillain(redeemingVillain===v.id?null:v.id)} style={{fontSize:9,padding:"3px 9px",background:redeemingVillain===v.id?"rgba(93,202,165,0.12)":"var(--bg3)",border:`1px solid ${redeemingVillain===v.id?"rgba(93,202,165,0.4)":"var(--border)"}`,borderRadius:6,cursor:"pointer",color:redeemingVillain===v.id?"#5DCAA5":"var(--text3)",fontFamily:"monospace"}}>Recruit</button>
                    <button onClick={()=>removeVillain(v.id)} style={{fontSize:9,padding:"3px 9px",background:"rgba(163,45,45,0.1)",border:"1px solid rgba(163,45,45,0.28)",borderRadius:6,cursor:"pointer",color:"#e74c3c",fontFamily:"monospace"}}>Remove</button>
                  </div>
                </div>
                <div style={{fontSize:11,color:"var(--text2)",fontStyle:"italic",lineHeight:1.5,marginBottom:8}}>{v.tagline}</div>
                {v.targetTeams&&v.targetTeams.length>0&&(<div>
                  <div style={{fontSize:9,letterSpacing:"0.12em",color:"rgba(139,26,26,0.6)",textTransform:"uppercase",marginBottom:5}}>Targets</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {v.targetTeams.map(tid=>{const t=teams.find(x=>x.id===tid);return t?<span key={tid} style={{fontSize:9,padding:"2px 9px",background:`${t.color}14`,border:`1px solid ${t.color}33`,borderRadius:20,color:t.color}}>{t.abbr} · {t.name}</span>:null;})}
                  </div>
                </div>)}
                {redeemingVillain===v.id&&(<div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"10px 0 2px",alignItems:"center"}}>
                  <span style={{fontSize:9,color:"#5DCAA5",letterSpacing:"0.1em",marginRight:4}}>RECRUIT TO:</span>
                  {teams.map(t=><button key={t.id} onClick={()=>redeemVillain(v,t.id)} style={{fontSize:9,padding:"3px 10px",background:`${t.color}14`,border:`1px solid ${t.color}44`,borderRadius:20,cursor:"pointer",color:t.color,fontFamily:"monospace"}}>{t.name}</button>)}
                  <button onClick={()=>setRedeemingVillain(null)} style={{fontSize:9,padding:"3px 8px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:20,cursor:"pointer",color:"var(--text4)",fontFamily:"monospace"}}>Cancel</button>
                </div>)}
              </div>))}
            </div>
          </>)}
          {villainPool.length===0&&<div style={{textAlign:"center",padding:"30px",color:"var(--text3)",fontSize:12}}>No villains created yet. Every hero team needs an antagonist.</div>}
        </>)}
      </>)}

      {/* ── STORY TAB ─────────────────────────────────────────────────── */}
      {tab==="story"&&(<>
        <p style={{fontSize:12,color:"var(--text2)",marginBottom:18,lineHeight:1.7}}>Generate a cinematic Meta AI scene prompt. Pull cast from any team.</p>
        <div style={s.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={s.lbl}>Select Cast</span>
            <button onClick={()=>setCrossover(p=>!p)} style={{fontSize:9,padding:"3px 10px",background:crossover?"rgba(212,175,55,0.12)":"var(--bg3)",border:`1px solid ${crossover?G:"var(--border)"}`,borderRadius:20,cursor:"pointer",color:crossover?G:"var(--text2)",fontFamily:"monospace"}}>
              {crossover?"🌐 Crossover ON":"🌐 Crossover OFF"}
            </button>
          </div>
          {crossover?(
            <div style={{marginBottom:18}}>
              {teams.map(t=>{
                const tr=getTeamRoster(t.id);
                if(!tr.length)return null;
                return(<div key={t.id} style={{marginBottom:12}}>
                  <div style={{fontSize:9,color:t.color,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>{t.name}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{tr.map(m=><button key={m.id} onClick={()=>setSCast(p=>p.includes(m.id)?p.filter(x=>x!==m.id):[...p,m.id])} style={{display:"flex",alignItems:"center",gap:5,...s.chip(sCast.includes(m.id),m.color),padding:"5px 10px"}}>{images[m.id]&&<img src={images[m.id]} alt="" style={{width:16,height:16,borderRadius:"50%",objectFit:"cover",objectPosition:"top"}}/>}{m.heroName}</button>)}</div>
                </div>);
              })}
              {villainPool.length>0&&<div><div style={{fontSize:9,color:"#E07070",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Villains</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{villainPool.map(v=><button key={v.id} onClick={()=>setSCast(p=>p.includes(v.id)?p.filter(x=>x!==v.id):[...p,v.id])} style={{display:"flex",alignItems:"center",gap:5,...s.chip(sCast.includes(v.id),"#8B1A1A"),padding:"5px 10px"}}><span style={{fontSize:9}}>⚠</span>{v.heroName}</button>)}</div></div>}
            </div>
          ):(
            <div style={{marginBottom:18}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {[...activeRoster,...villainPool.filter(v=>v.targetTeams?.includes(activeTeamId))].map(m=><button key={m.id} onClick={()=>setSCast(p=>p.includes(m.id)?p.filter(x=>x!==m.id):[...p,m.id])} style={{display:"flex",alignItems:"center",gap:6,...s.chip(sCast.includes(m.id),m.isVillain?"#8B1A1A":m.color)}}>

          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {[["allied","#0F6E56"],["rival","#BA7517"],["enemy","#8B1A1A"],["splinter","#993C1D"],["neutral","#555555"]].map(([k,c])=><div key={k} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 9px",background:`${c}10`,border:`1px solid ${c}33`,borderRadius:20}}>
              <div style={{width:14,height:2,background:c,borderRadius:1}}/>
              <span style={{fontSize:9,color:c,fontFamily:"monospace"}}>{k}</span>
            </div>)}
          </div>
          {otherTeams.length===0&&<div style={{textAlign:"center",padding:"16px",color:"var(--text3)",fontSize:11}}>Create additional teams in the Teams tab to populate the map.</div>}
        </>);
      })()}

    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
