function StatBar({ label, value, color }) {
  return (
    <div style={{ marginBottom: 7 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
        <span style={{ fontSize: 9, letterSpacing: "0.1em", color: "rgba(255,255,255,0.38)", textTransform: "uppercase" }}>{label}</span>
        <span style={{ fontSize: 9, color, fontWeight: "bold" }}>{value}</span>
      </div>
      <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2 }}>
        <div style={{ height: 3, width: `${value}%`, background: color, borderRadius: 2 }} />
      </div>
    </div>
  );
}

function CharacterPage({ member, imageUrl }) {

      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1.15fr" }}>
        <div style={{ position: "relative", background: "#0A0A14", borderRight: `1px solid ${member.color}1A`, minHeight: 460 }}>
          {imageUrl ? (
            <img src={imageUrl} alt={member.heroName} style={{ width: "100%", height: "100%", minHeight: 460, objectFit: "cover", objectPosition: "center top", display: "block" }} />
          ) : (
            <div style={{ minHeight: 460, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <div style={{ width: 56, height: 56, borderRadius: "50%", background: `${member.color}14`, border: `2px dashed ${member.color}40`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: "bold", color: member.color }}>{member.initials}</div>

          )}

          <div style={{ position: "absolute", bottom: 12, left: 12, right: 12 }}>
            <div style={{ fontSize: 22, fontWeight: "bold", color: "#F2EDD8", lineHeight: 1, textShadow: "0 2px 14px rgba(0,0,0,0.95)" }}>{member.heroName}</div>
            <div style={{ fontSize: 10, color: member.colorLight || member.color, marginTop: 3 }}>{member.realName}</div>
          </div>
        </div>
        <div style={{ padding: "16px 18px", display: "flex", flexDirection: "column", gap: 13, maxHeight: 560, overflowY: "auto" }}>
          {member.tagline && <div style={{ borderLeft: `2px solid ${member.color}`, paddingLeft: 10, fontSize: 11.5, color: "rgba(255,255,255,0.5)", fontStyle: "italic", lineHeight: 1.5 }}>{member.tagline}</div>}
          <div>

          <div>
            <div style={{ fontSize: 9, letterSpacing: "0.18em", color: `${member.color}88`, textTransform: "uppercase", marginBottom: 8 }}>Abilities</div>

function App() {
  const [mode, setMode] = React.useState("pages");
  const [roster, setRoster] = React.useState(DEFAULT_NK);
  const [images, setImages] = React.useState({});
  const [expanded, setExpanded] = React.useState({});
  const [nkArtStyle, setNkArtStyle] = React.useState("comic");
  const [nkPrompt, setNkPrompt] = React.useState(null);
  const [nkLoading, setNkLoading] = React.useState(false);
  const [selectedNK, setSelectedNK] = React.useState(null);
  const [headshot, setHeadshot] = React.useState(null);
  const [headshotB64, setHeadshotB64] = React.useState(null);
  const [heroName, setHeroName] = React.useState("");
  const [heroDesc, setHeroDesc] = React.useState("");
  const [costume, setCostume] = React.useState("sleek");
  const [pose, setPose] = React.useState("power");
  const [artStyle, setArtStyle] = React.useState("comic");
  const [customLoading, setCustomLoading] = React.useState(false);
  const [customPrompts, setCustomPrompts] = React.useState(null);
  const [customError, setCustomError] = React.useState(null);
  const [recruitStep, setRecruitStep] = React.useState(0);
  const [recruitAnswers, setRecruitAnswers] = React.useState({});
  const [recruitRealName, setRecruitRealName] = React.useState("");
  const [recruitAccent, setRecruitAccent] = React.useState("crimson");
  const [recruitLoading, setRecruitLoading] = React.useState(false);
  const [recruitResult, setRecruitResult] = React.useState(null);
  const [recruitError, setRecruitError] = React.useState(null);
  const [copied, setCopied] = React.useState({});
  const fileRefs = React.useRef({});
  const headRef = React.useRef();

  const handleNKImage = React.useCallback((id, file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setImages(p => ({ ...p, [id]: URL.createObjectURL(file) }));
  }, []);

  const handleHeadshot = React.useCallback((file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setHeadshot(URL.createObjectURL(file));
    const reader = new FileReader();
    reader.onload = e => setHeadshotB64(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  }, []);

  const callClaude = async (messages) => {
    const res = await fetch(API_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1200, messages })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || data.error);
    const text = data.content?.find(b => b.type === "text")?.text || "{}";
    return JSON.parse(text.replace(/```json|```/g, "").trim());
  };

  const generateNKPrompt = async (member) => {
    setSelectedNK(member.id); setNkLoading(true); setNkPrompt(null);
    const style = ART_STYLES.find(a => a.id === nkArtStyle)?.text || "";
    const hasRef = images[member.id];
    const refNote = hasRef ? `IMPORTANT: Reference image exists. Start metaAI with: "Maintaining exact character design from reference image — same face, same costume, same color scheme, same power effects. Do not redesign."` : "";
    try {
      const parsed = await callClaude([{ role: "user", content: `Generate superhero prompts. JSON only, keys "metaAI" and "tripo3D".\n\n${refNote}\nCharacter: ${member.heroName} (${member.realName})\nCostume (exact): ${member.costumeDesc || `void-black suit with ${member.color} accent`}\nPower FX (exact): ${member.powerFX || `${member.color} energy effects`}\nDesign rules: ${member.consistencyNotes || ""}\nArt style: ${style}\n\nmetaAI: 3-4 sentence full-body portrait. Athletic, late 20s-30s. Exact costume and FX. Nighttime urban background. End: "Full body visible, portrait orientation."\ntripo3D: 1 sentence FDM print prompt with separate color regions.` }]);
      setNkPrompt({ member, ...parsed });
    } catch (e) { setNkPrompt({ error: true, msg: e.message }); }
    setNkLoading(false);
  };

  const generateGroup = async () => {
    setSelectedNK("group"); setNkLoading(true); setNkPrompt(null);
    const style = ART_STYLES.find(a => a.id === nkArtStyle)?.text || "";
    const refCount = roster.filter(m => images[m.id]).length;
    const refNote = refCount > 0 ? `${refCount} reference images exist. Prompt must start with: "Maintaining exact character designs from reference images."` : "";
    const memberDescs = roster.map(m => `${m.heroName}: void-black suit, ${m.color} accent, ${m.powerFX || m.color + " energy"}`).join("; ");
    try {
      const parsed = await callClaude([{ role: "user", content: `Group shot Meta AI prompt for The Nocturnal Knights. JSON only, key "metaAI".\n\n${refNote}\nStyle: ${style}\nMembers: ${memberDescs}\nSetting: rain-soaked rooftop at night, glowing city, storm clouds, dramatic uplight.\n3-4 sentences. End: "Wide cinematic format, all characters fully visible."` }]);
      setNkPrompt({ group: true, metaAI: parsed.metaAI });
    } catch (e) { setNkPrompt({ error: true, msg: e.message }); }
    setNkLoading(false);
  };

  const generateCustomPrompts = async () => {
    if (!headshotB64) return;
    setCustomLoading(true); setCustomError(null); setCustomPrompts(null);
    try {
      const parsed = await callClaude([{ role: "user", content: [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: headshotB64 } },
        { type: "text", text: `Analyze headshot. JSON only, keys "metaAI" and "tripo3D".\nHero: ${heroName || "unnamed"}\nExtra: ${heroDesc || "none"}\nCostume: ${COSTUME_STYLES.find(c => c.id === costume)?.text}\nPose: ${POSES.find(p => p.id === pose)?.text}\nStyle: ${ART_STYLES.find(a => a.id === artStyle)?.text}\nmetaAI: 3-4 sentence portrait preserving exact facial features. Nighttime urban bg. End: "Full body visible, portrait orientation. Consistent with reference headshot."\ntripo3D: 1-2 sentence FDM optimization prompt.` }
      ]}]);
      setCustomPrompts(parsed);
    } catch (e) { setCustomError("Generation failed: " + e.message); }
    setCustomLoading(false);
  };

  const generateRecruit = async () => {
    setRecruitLoading(true); setRecruitError(null); setRecruitResult(null);
    const accentHex = ACCENT_COLORS.find(a => a.id === recruitAccent)?.hex || "#A32D2D";
    const answerSummary = QUIZ.map(q => {
      const opt = q.options.find(o => o.id === recruitAnswers[q.id]);
      return `${q.question}: ${opt?.value || "not answered"}`;
    }).join("\n");
    try {
      const parsed = await callClaude([{ role: "user", content: `Create a Nocturnal Knights anti-hero. JSON only — keys: heroName, tagline, role, origin, powers, stats, costumeDesc, powerFX, consistencyNotes, dna.\n\nReal name: ${recruitRealName || "unknown"}\nAccent color: ${accentHex}\nTeam context: dark urban anti-heroes, void-black base suits, each member has ONE accent color\n\nQuiz answers:\n${answerSummary}\n\nRules:\n- heroName: 1-2 word dark powerful name, unique from: Darkstar, Phantom Edge, Chimera, Paladin\n- tagline: one punchy sentence\n- role: short role descriptor\n- origin: 2-3 sentence backstory connecting to their answers and the NK world (government corruption, shadowy org)\n- powers: array of 4 objects with name (2-3 words) and desc (1-2 visual sentences)\n- stats: object with Power, Speed, Tech, Intellect, Will each 30-100\n- costumeDesc: 1 sentence void-black suit with ${accentHex} accent and NK crest\n- powerFX: 1 sentence visible power effects using ${accentHex}\n- consistencyNotes: 1-2 sentences of design lock rules\n- dna: array of 2-3 character inspirations matching their quiz answers` }]);
      const num = String(roster.length + 1).padStart(2, "0");
      setRecruitResult({ id: `recruit-${Date.now()}`, realName: recruitRealName || "Unknown", color: accentHex, colorLight: accentHex + "CC", initials: recruitRealName ? recruitRealName.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase() : "??", number: num, isRecruit: true, ...parsed });
    } catch (e) { setRecruitError("Generation failed: " + e.message); }
    setRecruitLoading(false);
  };

  const addToRoster = () => {
    if (!recruitResult) return;
    setRoster(p => [...p, recruitResult]);
    setRecruitResult(null); setRecruitAnswers({}); setRecruitRealName(""); setRecruitStep(0);
    setMode("pages");
  };

  const copy = (key, text) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(p => ({ ...p, [key]: true }));
      setTimeout(() => setCopied(p => ({ ...p, [key]: false })), 2000);
    });
  };

  const toggle = id => setExpanded(p => ({ ...p, [id]: !p[id] }));

  const accentHex = ACCENT_COLORS.find(a => a.id === recruitAccent)?.hex || G;
  const currentQ = QUIZ[recruitStep - 1];

  const s = {
    tab: a => ({ padding: "10px 16px", fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", cursor: "pointer", border: "none", background: "transparent", color: a ? G : "rgba(255,255,255,0.28)", borderBottom: a ? `2px solid ${G}` : "2px solid transparent", whiteSpace: "nowrap", flexShrink: 0 }),
    card: { background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 10, padding: "14px 16px" },
    lbl: { fontSize: 9, letterSpacing: "0.18em", color: "rgba(212,175,55,0.45)", textTransform: "uppercase", marginBottom: 8, display: "block" },
    chip: (active, color = G) => ({ padding: "6px 12px", background: active ? `${color}16` : "rgba(255,255,255,0.03)", border: `1px solid ${active ? color : "rgba(255,255,255,0.07)"}`, borderRadius: 20, cursor: "pointer", fontSize: 10.5, color: active ? color : "rgba(255,255,255,0.38)", fontWeight: active ? "bold" : "normal" }),
    promptBox: { background: "rgba(0,0,0,0.45)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 8, padding: "12px 14px", fontSize: 11.5, color: "#BFBBA6", lineHeight: 1.7, whiteSpace: "pre-wrap", wordBreak: "break-word" },
    copyBtn: done => ({ padding: "4px 11px", background: done ? `${G}1A` : "rgba(255,255,255,0.04)", border: `1px solid ${done ? G : "rgba(255,255,255,0.1)"}`, borderRadius: 6, cursor: "pointer", fontSize: 10, color: done ? G : "rgba(255,255,255,0.32)" }),
    bigBtn: (dis, c = G) => ({ width: "100%", padding: "12px", background: dis ? "rgba(255,255,255,0.03)" : `${c}14`, border: `1px solid ${dis ? "rgba(255,255,255,0.07)" : c}`, borderRadius: 8, cursor: dis ? "not-allowed" : "pointer", color: dis ? "rgba(255,255,255,0.22)" : c, fontSize: 10.5, letterSpacing: "0.12em", textTransform: "uppercase", marginTop: 6 }),
    optBtn: (active, c = G) => ({ width: "100%", padding: "12px 16px", background: active ? `${c}18` : "rgba(255,255,255,0.025)", border: `1px solid ${active ? c : "rgba(255,255,255,0.07)"}`, borderRadius: 9, cursor: "pointer", color: active ? "#F0EAD6" : "rgba(255,255,255,0.5)", fontSize: 12, textAlign: "left", marginBottom: 8 }),
  };

  return (
    <div style={{ background: "#09090F", minHeight: "100vh", paddingBottom: 60 }}>
      <div style={{ borderBottom: "1px solid rgba(212,175,55,0.15)", padding: "16px 22px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 9, letterSpacing: "0.2em", color: G, textTransform: "uppercase" }}>3D Print Studio</div>
          <div style={{ fontSize: 18, fontWeight: "bold", letterSpacing: "0.04em", color: "#F0EAD6" }}>SUPERHERO FORGE</div>
        </div>
        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.22)", textAlign: "right", lineHeight: 1.6 }}>Nocturnal Knights<br />{roster.length} members</div>
      </div>

      <div style={{ display: "flex", borderBottom: "1px solid rgba(212,175,55,0.1)", padding: "0 22px", overflowX: "auto" }}>
        {["pages","prompts","recruit","custom"].map(t => (
          <button key={t} onClick={() => setMode(t)} style={s.tab(mode === t)}>
            {t === "pages" ? "Character Pages" : t === "prompts" ? "NK Prompts" : t === "recruit" ? "+ New Recruit" : "Custom Hero"}
          </button>
        ))}
      </div>

      <div style={{ padding: "22px", maxWidth: 880, margin: "0 auto" }}>

        {/* CHARACTER PAGES */}
        {mode === "pages" && (
          <>
            <p style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 18, lineHeight: 1.7 }}>Upload Meta AI images and click any character to expand their full page.</p>
            <div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.min(roster.length, 4)}, 1fr)`, gap: 10, marginBottom: 24 }}>
              {roster.map(m => (
                <div key={m.id}>
                  <input type="file" accept="image/*" style={{ display: "none" }} ref={el => fileRefs.current[m.id] = el} onChange={e => handleNKImage(m.id, e.target.files[0])} />
                  <div onClick={() => fileRefs.current[m.id]?.click()} style={{ background: images[m.id] ? "transparent" : `${m.color}08`, border: `1.5px dashed ${images[m.id] ? m.color + "66" : m.color + "2E"}`, borderRadius: 9, overflow: "hidden", cursor: "pointer", aspectRatio: "3/4", position: "relative", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 6 }}>
                    {images[m.id] ? (
                      <>
                        <img src={images[m.id]} alt={m.heroName} style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "top", position: "absolute", inset: 0 }} />
                        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(transparent 55%, rgba(0,0,0,0.88))" }} />
                        <div style={{ position: "absolute", bottom: 8, left: 8 }}>
                          <div style={{ fontSize: 11, fontWeight: "bold", color: "#fff" }}>{m.heroName}</div>
                          <div style={{ fontSize: 8, color: m.colorLight || m.color }}>{m.number}</div>
                        </div>
                        <div style={{ position: "absolute", top: 6, right: 6, background: `${m.color}dd`, borderRadius: 10, padding: "2px 6px", fontSize: 8, color: "#fff" }}>✓</div>
                      </>
                    ) : (
                      <>
                        <div style={{ width: 34, height: 34, borderRadius: "50%", background: `${m.color}14`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: "bold", color: m.color }}>{m.initials}</div>
                        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.22)", textAlign: "center", lineHeight: 1.4 }}>{m.heroName}<br />tap to upload</div>
                      </>
                    )}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {roster.map(m => (
                <div key={m.id}>
                  <div onClick={() => toggle(m.id)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", background: expanded[m.id] ? `${m.color}0E` : "rgba(255,255,255,0.02)", border: `1px solid ${expanded[m.id] ? m.color + "44" : "rgba(255,255,255,0.06)"}`, borderRadius: expanded[m.id] ? "10px 10px 0 0" : 10, cursor: "pointer" }}>
                    {images[m.id] ? <img src={images[m.id]} alt="" style={{ width: 38, height: 38, borderRadius: 6, objectFit: "cover", objectPosition: "top", flexShrink: 0 }} /> : <div style={{ width: 38, height: 38, borderRadius: 6, background: `${m.color}14`, border: `1px dashed ${m.color}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: "bold", color: m.color, flexShrink: 0 }}>{m.initials}</div>}
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 13, fontWeight: "bold", color: "#F0EAD6" }}>{m.heroName}</span>
                        {m.isRecruit && <span style={{ fontSize: 8, background: `${G}22`, border: `1px solid ${G}44`, color: G, padding: "1px 6px", borderRadius: 8 }}>NEW</span>}
                      </div>
                      <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", marginTop: 1 }}>{m.role}</div>
                    </div>
                    <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                      {m.powers.slice(0, 2).map(p => <span key={p.name} style={{ fontSize: 8.5, padding: "2px 7px", background: `${m.color}12`, border: `1px solid ${m.color}2A`, borderRadius: 10, color: m.colorLight || m.color }}>{p.name}</span>)}
                      {m.isRecruit && <button onClick={e => { e.stopPropagation(); setRoster(r => r.filter(x => x.id !== m.id)); }} style={{ background: "rgba(163,45,45,0.15)", border: "1px solid rgba(163,45,45,0.3)", borderRadius: 6, color: "#e74c3c", fontSize: 10, padding: "2px 8px", cursor: "pointer" }}>Remove</button>}
                    </div>
                    <div style={{ fontSize: 11, color: `${m.color}88`, minWidth: 16 }}>{expanded[m.id] ? "▲" : "▼"}</div>
                  </div>
                  {expanded[m.id] && <div style={{ border: `1px solid ${m.color}44`, borderTop: "none", borderRadius: "0 0 10px 10px", overflow: "hidden" }}><CharacterPage member={m} imageUrl={images[m.id] || null} /></div>}
                </div>
              ))}
            </div>
          </>
        )}

        {/* NK PROMPTS */}
        {mode === "prompts" && (
          <>
            <div style={{ ...s.card, marginBottom: 16 }}>
              <span style={s.lbl}>Art Style</span>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {ART_STYLES.map(a => <button key={a.id} style={s.chip(nkArtStyle === a.id)} onClick={() => setNkArtStyle(a.id)}>{a.label}</button>)}
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(190px, 1fr))", gap: 10, marginBottom: 14 }}>
              {roster.map(m => (
                <div key={m.id} onClick={() => generateNKPrompt(m)} style={{ background: selectedNK === m.id ? `${m.color}12` : "rgba(255,255,255,0.025)", border: `1px solid ${selectedNK === m.id ? m.color + "55" : "rgba(255,255,255,0.06)"}`, borderRadius: 10, padding: "14px 16px", cursor: "pointer" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    {images[m.id] ? <img src={images[m.id]} alt="" style={{ width: 30, height: 30, borderRadius: "50%", objectFit: "cover", objectPosition: "top", flexShrink: 0 }} /> : <div style={{ width: 30, height: 30, borderRadius: "50%", background: `${m.color}16`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: "bold", color: m.color, flexShrink: 0 }}>{m.initials}</div>}
                    <div>
                      <div style={{ fontSize: 12, fontWeight: "bold", color: "#F0EAD6" }}>{m.heroName}</div>
                      <div style={{ fontSize: 9, color: m.color }}>{m.realName}</div>
                    </div>
                  </div>
                  <div style={{ fontSize: 9, color: "rgba(255,255,255,0.26)", fontStyle: "italic", lineHeight: 1.4 }}>{m.consistencyNotes || `${m.color} accent only`}</div>
                  {nkLoading && selectedNK === m.id && <div style={{ marginTop: 7, fontSize: 9, color: G }}>Generating...</div>}
                </div>
              ))}
            </div>
            <button style={s.bigBtn(nkLoading)} onClick={generateGroup} disabled={nkLoading}>{nkLoading && selectedNK === "group" ? "Building..." : "Generate Full Team Group Shot"}</button>
            {nkPrompt && !nkPrompt.error && (
              <div style={{ ...s.card, marginTop: 20 }}>
                <div style={{ fontSize: 12, fontWeight: "bold", color: nkPrompt.group ? G : roster.find(m => m.id === nkPrompt.member?.id)?.color || G, marginBottom: 12 }}>
                  {nkPrompt.group ? "Group Shot" : `${nkPrompt.member?.heroName} · Prompts`}
                </div>
                {nkPrompt.metaAI && <><span style={s.lbl}>Meta AI Prompt</span><div style={s.promptBox}>{nkPrompt.metaAI}</div><div style={{ display: "flex", justifyContent: "flex-end", marginTop: 6, marginBottom: 14 }}><button style={s.copyBtn(copied.meta)} onClick={() => copy("meta", nkPrompt.metaAI)}>{copied.meta ? "Copied!" : "Copy"}</button></div></>}
                {nkPrompt.tripo3D && <><span style={s.lbl}>Tripo3D Prompt</span><div style={s.promptBox}>{nkPrompt.tripo3D}</div><div style={{ display: "flex", justifyContent: "flex-end", marginTop: 6 }}><button style={s.copyBtn(copied.tripo)} onClick={() => copy("tripo", nkPrompt.tripo3D)}>{copied.tripo ? "Copied!" : "Copy"}</button></div></>}
              </div>
            )}
            {nkPrompt?.error && <div style={{ marginTop: 14, padding: "12px", background: "rgba(192,57,43,0.1)", border: "1px solid rgba(192,57,43,0.28)", borderRadius: 8, fontSize: 11, color: "#e74c3c" }}>Failed: {nkPrompt.msg}</div>}
          </>
        )}

        {/* NEW RECRUIT */}
        {mode === "recruit" && (
          <>
            <div style={{ marginBottom: 22 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ fontSize: 10, color: "rgba(255,255,255,0.4)" }}>{recruitResult ? "Review your recruit" : recruitStep === 0 ? "Identity" : `Question ${recruitStep} of ${QUIZ.length}`}</span>
                <span style={{ fontSize: 10, color: G }}>{recruitResult ? "Complete" : `${Math.round((recruitStep / (QUIZ.length + 1)) * 100)}%`}</span>
              </div>
              <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2 }}>
                <div style={{ height: 3, width: `${recruitResult ? 100 : (recruitStep / (QUIZ.length + 1)) * 100}%`, background: G, borderRadius: 2 }} />
              </div>
            </div>

            {!recruitResult && recruitStep === 0 && (
              <div style={s.card}>
                <div style={{ fontSize: 15, fontWeight: "bold", color: "#F0EAD6", marginBottom: 16 }}>Who is this recruit?</div>
                <span style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6, display: "block" }}>Real Name (optional)</span>
                <input type="text" placeholder="e.g. Devon Marshall" value={recruitRealName} onChange={e => setRecruitRealName(e.target.value)} />
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: "0.1em", margin: "18px 0 8px" }}>Accent Color</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {ACCENT_COLORS.map(ac => (
                    <button key={ac.id} onClick={() => setRecruitAccent(ac.id)} style={{ display: "flex", alignItems: "center", gap: 7, padding: "7px 13px", background: recruitAccent === ac.id ? `${ac.hex}18` : "rgba(255,255,255,0.03)", border: `1px solid ${recruitAccent === ac.id ? ac.hex : "rgba(255,255,255,0.07)"}`, borderRadius: 20, cursor: "pointer", fontSize: 11, color: recruitAccent === ac.id ? "#F0EAD6" : "rgba(255,255,255,0.4)" }}>
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: ac.hex, flexShrink: 0 }} />{ac.label}
                    </button>
                  ))}
                </div>
                <button style={s.bigBtn(false)} onClick={() => setRecruitStep(1)}>Begin Assessment →</button>
              </div>
            )}

            {!recruitResult && recruitStep >= 1 && recruitStep <= QUIZ.length && currentQ && (
              <div style={s.card}>
                <div style={{ fontSize: 15, fontWeight: "bold", color: "#F0EAD6", marginBottom: 18, lineHeight: 1.4 }}>{currentQ.question}</div>
                {currentQ.options.map(opt => (
                  <button key={opt.id} onClick={() => {
                    setRecruitAnswers(p => ({ ...p, [currentQ.id]: opt.id }));
                    if (recruitStep < QUIZ.length) setRecruitStep(p => p + 1);
                  }} style={s.optBtn(recruitAnswers[currentQ.id] === opt.id, accentHex)}>{opt.label}</button>
                ))}
                <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                  <button onClick={() => setRecruitStep(p => Math.max(0, p - 1))} style={{ flex: 1, padding: "10px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 8, cursor: "pointer", color: "rgba(255,255,255,0.35)", fontSize: 10.5 }}>← Back</button>
                  {recruitStep === QUIZ.length && recruitAnswers[currentQ.id] && (
                    <button onClick={generateRecruit} disabled={recruitLoading} style={{ flex: 2, ...s.bigBtn(recruitLoading, accentHex), marginTop: 0 }}>
                      {recruitLoading ? "Forging identity..." : "Generate Recruit →"}
                    </button>
                  )}
                </div>
                {recruitError && <div style={{ marginTop: 10, fontSize: 11, color: "#e74c3c" }}>{recruitError}</div>}
              </div>
            )}

            {recruitResult && (
              <>
                <div style={{ marginBottom: 14, padding: "12px 16px", background: `${recruitResult.color}0C`, border: `1px solid ${recruitResult.color}33`, borderRadius: 10, display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 44, height: 44, borderRadius: "50%", background: `${recruitResult.color}18`, border: `1px solid ${recruitResult.color}55`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: "bold", color: recruitResult.color, flexShrink: 0 }}>{recruitResult.initials}</div>
                  <div>
                    <div style={{ fontSize: 18, fontWeight: "bold", color: "#F0EAD6" }}>{recruitResult.heroName}</div>
                    <div style={{ fontSize: 11, color: recruitResult.color }}>{recruitResult.realName} · {recruitResult.role}</div>
                  </div>
                </div>
                <CharacterPage member={recruitResult} imageUrl={null} />
                <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
                  <button onClick={() => { setRecruitResult(null); setRecruitStep(0); setRecruitAnswers({}); }} style={{ flex: 1, padding: "11px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 8, cursor: "pointer", color: "rgba(255,255,255,0.4)", fontSize: 10.5 }}>Regenerate</button>
                  <button onClick={addToRoster} style={{ flex: 2, padding: "11px", background: `${recruitResult.color}16`, border: `1px solid ${recruitResult.color}`, borderRadius: 8, cursor: "pointer", color: recruitResult.color, fontSize: 10.5, letterSpacing: "0.1em", textTransform: "uppercase" }}>Add to Roster →</button>
                </div>
              </>
            )}
          </>
        )}

        {/* CUSTOM HERO */}
        {mode === "custom" && (
          <>
            <p style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 18, lineHeight: 1.7 }}>Upload any headshot to generate a full superhero character art prompt.</p>
            <div style={{ width: "100%", aspectRatio: "16/7", background: headshot ? "transparent" : "rgba(255,255,255,0.02)", border: `2px dashed ${headshot ? G + "55" : "rgba(255,255,255,0.1)"}`, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", marginBottom: 18, overflow: "hidden", position: "relative" }}
              onClick={() => headRef.current?.click()} onDragOver={e => e.preventDefault()} onDrop={e => { e.preventDefault(); handleHeadshot(e.dataTransfer.files[0]); }}>
              {headshot ? <img src={headshot} alt="Headshot" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : (
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 24, color: "rgba(255,255,255,0.12)", marginBottom: 8 }}>+</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.28)" }}>DROP HEADSHOT OR CLICK TO UPLOAD</div>
                </div>
              )}
              <input ref={headRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => handleHeadshot(e.target.files[0])} />
            </div>
            <div style={s.card}>
              <input type="text" placeholder="Hero name (optional)" value={heroName} onChange={e => setHeroName(e.target.value)} style={{ marginBottom: 10 }} />
              <input type="text" placeholder="Extra details (optional)" value={heroDesc} onChange={e => setHeroDesc(e.target.value)} />
            </div>
            <div style={{ ...s.card, marginTop: 10 }}>
              <span style={s.lbl}>Costume</span>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>{COSTUME_STYLES.map(c => <button key={c.id} style={s.chip(costume === c.id)} onClick={() => setCostume(c.id)}>{c.label}</button>)}</div>
              <span style={s.lbl}>Pose</span>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>{POSES.map(p => <button key={p.id} style={s.chip(pose === p.id)} onClick={() => setPose(p.id)}>{p.label}</button>)}</div>
              <span style={s.lbl}>Art Style</span>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{ART_STYLES.map(a => <button key={a.id} style={s.chip(artStyle === a.id)} onClick={() => setArtStyle(a.id)}>{a.label}</button>)}</div>
            </div>
            <button style={s.bigBtn(!headshot || customLoading)} onClick={generateCustomPrompts} disabled={!headshot || customLoading}>{customLoading ? "Analyzing face..." : !headshot ? "Upload a headshot first" : "Generate Prompts"}</button>
            {customError && <div style={{ marginTop: 12, padding: "12px", background: "rgba(192,57,43,0.1)", border: "1px solid rgba(192,57,43,0.28)", borderRadius: 8, fontSize: 11, color: "#e74c3c" }}>{customError}</div>}
            {customPrompts && (
              <div style={{ marginTop: 18 }}>
                <div style={s.card}>
                  <span style={s.lbl}>Meta AI Prompt</span>
                  <div style={s.promptBox}>{customPrompts.metaAI}</div>
                  <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 6 }}><button style={s.copyBtn(copied.cmeta)} onClick={() => copy("cmeta", customPrompts.metaAI)}>{copied.cmeta ? "Copied!" : "Copy"}</button></div>
                </div>
                <div style={{ ...s.card, marginTop: 10 }}>
                  <span style={s.lbl}>Tripo3D Prompt</span>
                  <div style={s.promptBox}>{customPrompts.tripo3D}</div>
                  <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 6 }}><button style={s.copyBtn(copied.ctripo)} onClick={() => copy("ctripo", customPrompts.tripo3D)}>{copied.ctripo ? "Copied!" : "Copy"}</button></div>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
